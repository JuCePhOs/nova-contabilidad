<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Contabilidad — NOVA IA Academy</title>
<link rel="icon" href="data:,">

<script>
  // Si algo falla al cargar, mostrarlo EN PANTALLA (no solo en consola)
  window.addEventListener('error', function(e){
    var root = document.getElementById('root');
    if(!root) return;
    var msg = (e.error && e.error.message) || e.message || 'Error desconocido';
    root.innerHTML = '<div style="padding:24px;font-family:monospace;font-size:13px;color:#fca5a5;background:#1a0e0e;white-space:pre-wrap;line-height:1.6">'
      + '⚠ Error al cargar la aplicación\n\n'
      + msg + '\n\n'
      + (e.filename ? ('Archivo: '+e.filename+(e.lineno?(' (línea '+e.lineno+')'):'')) : '')
      + '\n\nToma una captura de esto y compártela.</div>';
  });
  window.addEventListener('unhandledrejection', function(e){
    var root = document.getElementById('root');
    if(!root) return;
    var msg = (e.reason && e.reason.message) || String(e.reason) || 'Error desconocido';
    root.innerHTML = '<div style="padding:24px;font-family:monospace;font-size:13px;color:#fca5a5;background:#1a0e0e;white-space:pre-wrap;line-height:1.6">'
      + '⚠ Error (promesa) al cargar la aplicación\n\n' + msg
      + '\n\nToma una captura de esto y compártela.</div>';
  });
  function cdnError(name){
    return "var r=document.getElementById('root'); if(r) r.innerHTML='<div style=\\'padding:24px;font-family:monospace;font-size:13px;color:#fca5a5;background:#1a0e0e\\'>⚠ No se pudo cargar: "+name+"<br><br>Revisa tu conexión a internet. Si el problema persiste, puede que ese CDN esté bloqueado en tu red.</div>';";
  }
  // Red de seguridad: si tras 10s sigue en "Cargando" sin error explícito
  setTimeout(function(){
    var boot = document.getElementById('boot');
    if(boot){
      boot.outerHTML = '<div style="padding:24px;font-family:monospace;font-size:13px;color:#fbbf24;background:#1a1408;white-space:pre-wrap;line-height:1.6">'
        + '⚠ La aplicación tardó demasiado en cargar.\n\n'
        + 'Esto suele indicar que algún recurso externo no respondió.\n'
        + 'Recarga la página (F5). Si vuelve a quedarse así, toma una captura y compártela.</div>';
    }
  }, 10000);
</script>

.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600;white-space:nowrap}
.b-gr{background:var(--gr2);color:var(--gr)}
.b-rd{background:var(--rd2);color:var(--rd)}
.b-am{background:var(--am2);color:var(--am)}
.b-ac{background:var(--ac2);color:var(--ac)}
.b-pu{background:var(--pu2);color:var(--pu)}
.b-gy{background:rgba(74,99,128,.2);color:var(--tx2)}

/* ALERTS */
.alert{border-radius:var(--r);padding:14px;margin-bottom:14px;display:flex;gap:12px;align-items:flex-start;font-size:13px}
.al-am{background:var(--am2);border:1px solid rgba(245,193,71,.3);color:var(--am)}
.al-rd{background:var(--rd2);border:1px solid rgba(244,107,107,.3);color:var(--rd)}
.al-ac{background:var(--ac2);border:1px solid rgba(34,212,239,.3);color:var(--ac)}
.al-gr{background:var(--gr2);border:1px solid rgba(16,201,138,.3);color:var(--gr)}

/* MODAL */
.moverlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:999;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(6px)}
.modal{background:var(--s1);border:1px solid var(--br);border-radius:var(--r2);padding:26px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto}
.mhdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px}
.mtitle{font-size:18px;font-weight:700}
.mclose{background:none;border:none;color:var(--tx3);cursor:pointer;font-size:18px;padding:0;line-height:1;transition:color .15s}
.mclose:hover{color:var(--tx)}

/* COMMISSION BOX */
.cbox{background:var(--s2);border:1px solid rgba(245,193,71,.4);border-radius:var(--r);padding:16px;margin-top:14px}
.crow{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:13px}
.crow.ctotal{border-top:1px solid var(--br);margin-top:8px;padding-top:11px;font-weight:700;font-size:15px}

/* EMPTY */
.empty{text-align:center;padding:48px 24px;color:var(--tx3)}
.empty-icon{font-size:44px;margin-bottom:10px}
.empty-ttl{font-size:15px;font-weight:600;color:var(--tx2)}
.empty-sub{font-size:12px;margin-top:5px}

/* MISC */
.sec-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.sec-ttl{font-size:19px;font-weight:700;display:flex;align-items:center;gap:8px}
.fbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;align-items:center}
.finput{background:var(--s2);border:1px solid var(--br);border-radius:8px;padding:8px 11px;color:var(--tx);font-size:13px;font-family:var(--sans)}
.finput:focus{outline:none;border-color:var(--ac)}
.mono{font-family:var(--mono)}
.tr{text-align:right}
.tc{color:var(--ac)} .tg{color:var(--gr)} .tr2{color:var(--rd)} .ta{color:var(--am)} .td{color:var(--tx2)}
.mini-stat{background:var(--s1);border:1px solid var(--br);border-radius:8px;padding:11px 14px}
.ms-label{font-size:10px;color:var(--tx3);font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.ms-val{font-size:15px;font-weight:700;font-family:var(--mono);margin-top:3px}
.exp-item{background:var(--s1);border:1px solid var(--br);border-radius:var(--r2);padding:15px 18px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;transition:border-color .2s}
.ctooltip{background:var(--s2);border:1px solid var(--br);border-radius:8px;padding:10px 13px;font-size:12px;color:var(--tx)}
