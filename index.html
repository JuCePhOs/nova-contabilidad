<script>
  // Si algo falla al cargar, mostrarlo EN PANTALLA (no solo en consola)
  window.addEventListener('error', function(e){
    var root = document.getElementById('root');
    if(!root) return;
    var msg = (e.error && e.error.message) || e.message || 'Error desconocido';
    root.innerHTML = '<div style="padding:24px;font-family:monospace;font-size:13px;color:#fca5a5;background:#1a0e0e;white-space:pre-wrap;line-height:1.6">'
      + '⚠ Error al cargar la aplicación\n\n'
      + msg + '\n\n'
      + (e.filename ? ('Archivo: '+e.filename+(e.lineno?(' (línea '+e.lineno+')'):'')) : '')
      + '\n\nToma una captura de esto y compártela.</div>';
  });
  window.addEventListener('unhandledrejection', function(e){
    var root = document.getElementById('root');
    if(!root) return;
    var msg = (e.reason && e.reason.message) || String(e.reason) || 'Error desconocido';
    root.innerHTML = '<div style="padding:24px;font-family:monospace;font-size:13px;color:#fca5a5;background:#1a0e0e;white-space:pre-wrap;line-height:1.6">'
      + '⚠ Error (promesa) al cargar la aplicación\n\n' + msg
      + '\n\nToma una captura de esto y compártela.</div>';
  });
  function cdnError(name){
    return "var r=document.getElementById('root'); if(r) r.innerHTML='<div style=\\'padding:24px;font-family:monospace;font-size:13px;color:#fca5a5;background:#1a0e0e\\'>⚠ No se pudo cargar: "+name+"<br><br>Revisa tu conexión a internet. Si el problema persiste, puede que ese CDN esté bloqueado en tu red.</div>';";
  }
  // Red de seguridad: si tras 10s sigue en "Cargando" sin error explícito
  setTimeout(function(){
    var boot = document.getElementById('boot');
    if(boot){
      boot.outerHTML = '<div style="padding:24px;font-family:monospace;font-size:13px;color:#fbbf24;background:#1a1408;white-space:pre-wrap;line-height:1.6">'
        + '⚠ La aplicación tardó demasiado en cargar.\n\n'
        + 'Esto suele indicar que algún recurso externo no respondió.\n'
        + 'Recarga la página (F5). Si vuelve a quedarse así, toma una captura y compártela.</div>';
    }
  }, 10000);
</script>

let _fbDb=null, _fbReady=null;
function initFirebaseAuth(){
  if(_fbReady) return _fbReady;
  _fbReady=(async()=>{
    try{
      if(!firebase.apps.length) firebase.initializeApp(firebaseConfig);

// ─── CONSTANTES ────────────────────────────────────────────────────────────────
const MP_BASE    = 0.035;
const MP_IVA     = 0.16;

const INCOME_CATS      = ["Mensualidad","Inscripción","Taller","Certificación","Material Didáctico","Servicio Extra","Otro"];
const DEFAULT_EXPENSE_CATS = ["Renta","Electricidad","Internet","Agua","Salarios","Comisiones","Papelería","Publicidad","Mantenimiento","Impuestos","Software/Licencias","Equipos","Suscripciones","Otro"];

// Currency helpers — moneda activa se pasa como prop o desde contexto
const fmt$ = n => new Intl.NumberFormat("es-MX",{style:"currency",currency:"MXN"}).format(n||0);
const fmtUSD = n => new Intl.NumberFormat("en-US",{style:"currency",currency:"USD"}).format(n||0);
const fmtMoney = (n, cur, rate) => cur==="USD"&&rate ? fmtUSD((n||0)/rate)+" (≈"+fmt$(n)+")" : fmt$(n);
const fmtD = s => s ? new Date(s+"T12:00:00").toLocaleDateString("es-MX",{day:"2-digit",month:"2-digit",year:"numeric"}) : "—";
const todayStr  = () => new Date().toISOString().split("T")[0];
const monthStr  = () => todayStr().slice(0,7);
const uid       = () => Date.now().toString(36)+Math.random().toString(36).substr(2,6);
const calcMP    = amount => {
  const n = parseFloat(amount)||0;
  const comm = +(n * MP_BASE).toFixed(2);
  const iva  = +(comm * MP_IVA).toFixed(2);
  return { comm, iva, total: +(comm+iva).toFixed(2), net: +(n-comm-iva).toFixed(2) };
};

// ─── STORAGE — sincronizado vía Firebase (nova_contabilidad), con respaldo local ──
async function stor(cmd, key, val) {
  const k = "acad_v1_" + key;
  if (cmd === "set") {
    try{ localStorage.setItem(k, JSON.stringify(val)); }catch{}
    const ok=await initFirebaseAuth();
    if(!ok||!_fbDb) return null;
    try{ await _fbDb.ref('nova_contabilidad/'+key).set(val===undefined?null:val); return true; }
    catch(e){ return null; }
  }
  if (cmd === "get") {
    // Lectura inicial — el listener en tiempo real (App) sobreescribe esto al conectar
    try{ const r=localStorage.getItem(k); return r?JSON.parse(r):null; }catch{ return null; }
  }
  return null;
}

// ─── CRM BRIDGE — Firebase autenticado, cross-device, tiempo real ──────────────
async function loadCRM() {
  const ok=await initFirebaseAuth();
  if(ok&&_fbDb){
    try{
      const snap=await _fbDb.ref('nova_crm').once('value');
      const d=snap.val();
      if(d?.matrículas) return {...d,_source:"firebase"};
    }catch(e){}
  }
  // Respaldo: copia local del CRM en este mismo navegador
  try {
    const l = localStorage.getItem("nova_crm_v4");
    if (l) { const d = JSON.parse(l); if (d?.matrículas) return { ...d, _source: "local" }; }
  } catch {}
  return null;
}
// Extraer lista única de alumnos del CRM (por nombre)
function crmAlumnos(crm) {
  if (!crm?.matrículas) return [];
  const seen = new Set();
  return crm.matrículas.filter(m => { if (seen.has(m.alumno)) return false; seen.add(m.alumno); return true; });
}
// Costo base de un curso del CRM
function crmCostoCurso(crm, nombreCurso) {
  if (!crm?.cursos) return 0;
  const cur = crm.cursos.find(c => c.nombre === nombreCurso || c.name === nombreCurso);
  return cur ? (parseFloat(String(cur.costoBase||"").replace(/[^0-9.]/g,""))||0) : 0;
}


// ─── COMISIONES DE EMPLEADOS ─────────────────────────────────────────────────
// $120 por contrato creado y confirmado de pago (1 vez, no recurrente).
// Se cuenta en el mes en que se CREÓ el contrato (mesGanado);
// se liquida el día 15 del mes siguiente (mesPago).
const COMISION_POR_CONTRATO = 120;

function nextMonth(ym){
  const [y,m]=ym.split('-').map(Number);
  let ny=y, nm=m+1;
  if(nm>12){nm=1;ny++;}
  return `${ny}-${String(nm).padStart(2,'0')}`;
}

// ─── Gastos fijos: ocurrencias (soporta frecuencia mensual o semanal) ──────────
const DIAS_SEMANA=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
function diasEnMes(ym){
  const [y,m]=ym.split('-').map(Number);
  return new Date(y,m,0).getDate();
}
// Devuelve las fechas (YYYY-MM-DD) en que un gasto fijo cae dentro del mes `ym`.
// Mensual: una sola fecha (su día, recortado al último día del mes si no existe).
// Semanal: una fecha por cada vez que `diaSemana` ocurre en ese mes.
function ocurrenciasGasto(fe, ym){
  if((fe.frecuencia||"mensual")==="semanal"){
    const [y,m]=ym.split('-').map(Number);
    const n=diasEnMes(ym);
    const out=[];
    for(let d=1;d<=n;d++){
      if(new Date(y,m-1,d).getDay()===fe.diaSemana) out.push(`${ym}-${String(d).padStart(2,'0')}`);
    }
    return out;
  }
  const dia=Math.min(fe.dia||1, diasEnMes(ym));
  return [`${ym}-${String(dia).padStart(2,'0')}`];
}
// Busca si una ocurrencia específica ya fue pagada.
// Mensual: compatibilidad con pagos viejos (sin `ocurrencia`, solo `mes`).
// Semanal: cada ocurrencia se paga por separado, vía el campo `ocurrencia`.
function pagoDeOcurrencia(fe, fechaISO, pagosGastos){
  if((fe.frecuencia||"mensual")==="semanal"){
    return pagosGastos.find(p=>p.gastoId===fe.id&&p.ocurrencia===fechaISO);
  }
  return pagosGastos.find(p=>p.gastoId===fe.id&&p.mes===fechaISO.slice(0,7));
}

function calcComisiones(crmData){
  if(!crmData?.matrículas) return [];
  const usuarios = crmData.usuarios||[];
  const pagosReg = crmData.pagosRegulares||[];
  const cmActual = monthStr();
  const nombreDe = (u)=>{
    const us=usuarios.find(x=>x.username===u);
    return us?.name||u||"Sin asignar";
  };
  const grupos={};
  crmData.matrículas.forEach(m=>{
    // "Pagado y confirmado": existe un pago para este folio, o para el folio representante
    // del paquete al que pertenece este contrato (1 pago puede cubrir varios contratos/grupos)
    const repFolio = (m.paqueteFolios&&m.paqueteFolios[0]) ?? m.folio;
    const pagado=pagosReg.some(p=>String(p.crmFolio)===String(m.folio)||String(p.crmFolio)===String(repFolio));
    if(!pagado) return;
    // Contratos antiguos pueden no tener fechaISO/createdAt/createdBy. En vez de
    // descartarlos silenciosamente, los agrupamos en "Sin asignar" para que el
    // monto siga siendo visible (y se pueda reasignar manualmente más adelante).
    const fechaRef = m.fechaISO || m.createdAt || (cmActual+'-01');
    const mesGanado=fechaRef.slice(0,7);
    const creador = m.createdBy || 'sin_asignar';
    const key=creador+"|"+mesGanado;
    if(!grupos[key]) grupos[key]={usuario:creador,nombreUsuario:creador==='sin_asignar'?'Sin asignar':nombreDe(creador),mesGanado,folios:[]};
    grupos[key].folios.push(m.folio);
  });
  return Object.values(grupos).map(g=>{
    const mesPago=nextMonth(g.mesGanado);
    return {...g,count:g.folios.length,monto:g.folios.length*COMISION_POR_CONTRATO,mesPago,fechaPagoDefault:`${mesPago}-15`};
  }).sort((a,b)=>b.mesGanado.localeCompare(a.mesGanado)||a.nombreUsuario.localeCompare(b.nombreUsuario));
}

// ─── MODAL: RECORDATORIOS ────────────────────────────────────────────────────
function ModalRecordatorios({ pagos, onClose }) {
  const vencidos  = pagos.filter(p => p.isOverdue);
  const proximos  = pagos.filter(p => !p.isOverdue);
  return (
    <div className="moverlay" onClick={e => e.target===e.currentTarget && onClose()}>
      <div className="modal" style={{maxWidth:520}}>
        <div className="mhdr">
          <div>
            <div className="mtitle">⏰ Recordatorio de Pagos</div>
            <div style={{fontSize:12,color:"var(--tx2)",marginTop:3,textTransform:"capitalize"}}>
              {new Date().toLocaleDateString("es-MX",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}
            </div>
          </div>
          <button className="mclose" onClick={onClose}>✕</button>
        </div>
        {vencidos.length>0&&<>
          <div style={{fontSize:11,fontWeight:700,color:"var(--rd)",textTransform:"uppercase",letterSpacing:".6px",marginBottom:8}}>🚨 Vencidos</div>
          {vencidos.map(p=>(
            <div key={p.id} style={{background:"var(--rd2)",border:"1px solid rgba(244,107,107,.4)",borderRadius:8,padding:"12px 14px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
              <div><div style={{fontWeight:600,fontSize:14}}>{p.description}</div><div style={{fontSize:11,color:"var(--tx2)",marginTop:2}}>{p.category} · Día {p.dueDay}</div></div>
              <div style={{textAlign:"right"}}><div className="mono" style={{color:"var(--rd)",fontWeight:700}}>{fmt$(p.amount)}</div><div style={{fontSize:11,color:"var(--rd)",marginTop:2}}>{Math.abs(p.daysUntilDue)} día(s) vencido</div></div>
            </div>
          ))}
        </>}
        {proximos.length>0&&<div style={{marginTop:vencidos.length>0?14:0}}>
          <div style={{fontSize:11,fontWeight:700,color:"var(--am)",textTransform:"uppercase",letterSpacing:".6px",marginBottom:8}}>📅 Esta semana</div>
          {proximos.map(p=>(
            <div key={p.id} style={{background:"var(--am2)",border:"1px solid rgba(245,193,71,.4)",borderRadius:8,padding:"12px 14px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center",gap:10}}>
              <div><div style={{fontWeight:600,fontSize:14}}>{p.description}</div><div style={{fontSize:11,color:"var(--tx2)",marginTop:2}}>{p.category} · Día {p.dueDay} de cada mes</div></div>
              <div style={{textAlign:"right"}}><div className="mono" style={{fontWeight:700}}>{fmt$(p.amount)}</div><div style={{fontSize:11,color:"var(--am)",marginTop:2}}>{p.daysUntilDue===0?"¡Hoy!":p.daysUntilDue===1?"Mañana":`En ${p.daysUntilDue} días`}</div></div>
            </div>
          ))}
        </div>}
        <div style={{marginTop:18,textAlign:"right"}}>
          <button className="btn btn-p" onClick={onClose}>Entendido</button>
        </div>
      </div>
    </div>
  );
}

// ─── MODAL: AGREGAR INGRESO ──────────────────────────────────────────────────
function ModalIngreso({ onSave, onClose, crmData, prefill }) {
  const [f, setF] = useState({
    date:todayStr(), desc:"", alumno:"", cursoRef:"", crmFolio:"",
    monto:"", method:"cash", cat:"Mensualidad", notas:"",
    ...(prefill||{})
  });
  const set = (k,v) => setF(p=>({...p,[k]:v}));
  const mp = useMemo(()=> f.method==="card"?calcMP(f.monto):null,[f.method,f.monto]);
  const [showDrop, setShowDrop] = useState(false);
  const [almQ, setAlmQ] = useState("");

  const alumnos = useMemo(()=> crmAlumnos(crmData),[crmData]);
  const almFiltered = useMemo(()=>
    almQ ? alumnos.filter(a=>a.alumno.toLowerCase().includes(almQ.toLowerCase())||a.curso.toLowerCase().includes(almQ.toLowerCase())) : alumnos
  ,[alumnos,almQ]);

  function selAlumno(m) {
    const costo = crmCostoCurso(crmData, m.curso);
    setF(p=>({
      ...p, alumno:m.alumno, cursoRef:m.curso, crmFolio:String(m.folio),
      monto: costo > 0 ? costo.toString() : p.monto,
      desc: p.desc || `Mensualidad ${new Date().toLocaleDateString("es-MX",{month:"long",year:"numeric"})} — ${m.curso}`,
    }));
    setShowDrop(false); setAlmQ("");
  }

  function guardar(){
    if(!f.date||!f.desc||!f.monto) return;
    const n=parseFloat(f.monto);
    const c=f.method==="card"?calcMP(n):{comm:0,iva:0,total:0,net:n};
    onSave({id:uid(),...f,monto:n,comm:c.comm,ivaComm:c.iva,totalDed:c.total,neto:c.net,createdAt:new Date().toISOString()});
  }

  const methods=[["cash","💵 Efectivo"],["transfer","🏦 Transferencia"],["card","💳 Terminal MP"]];
  return(
    <div className="moverlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="mhdr"><div className="mtitle">💰 Registrar Ingreso</div><button className="mclose" onClick={onClose}>✕</button></div>
        <div className="fgrid">
          <div className="fgrp"><label className="flbl">Fecha *</label><input className="finp" type="date" value={f.date} onChange={e=>set("date",e.target.value)}/></div>
          <div className="fgrp"><label className="flbl">Categoría</label><select className="finp" value={f.cat} onChange={e=>set("cat",e.target.value)}>{INCOME_CATS.map(c=><option key={c}>{c}</option>)}</select></div>

          {/* ── CRM: Selector de alumno ── */}
          <div className="fgrp" style={{gridColumn:"1/-1"}}>
            <label className="flbl">
              {alumnos.length>0 ? "👤 Alumno del CRM" : "Nombre del Alumno"}
            </label>
            {alumnos.length>0 ? (
              <div className="alm-drop">
                <input className="finp" placeholder="Buscar alumno del CRM..." value={almQ||f.alumno}
                  onFocus={()=>setShowDrop(true)}
                  onChange={e=>{setAlmQ(e.target.value); if(!showDrop)setShowDrop(true);}}
                  onBlur={()=>setTimeout(()=>setShowDrop(false),180)}
                />
                {showDrop&&almFiltered.length>0&&(
                  <div className="alm-menu">
                    {almFiltered.map(m=>(
                      <div key={m.folio} className="alm-opt" onMouseDown={()=>selAlumno(m)}>
                        <div className="alm-opt-name">{m.alumno}</div>
                        <div className="alm-opt-sub">📚 {m.curso} · Folio #{m.folio}</div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            ):(
              <input className="finp" placeholder="Ej: María López" value={f.alumno} onChange={e=>set("alumno",e.target.value)}/>
            )}
            {f.crmFolio&&(
              <div className="crm-prefill" style={{marginTop:6}}>
                🔗 CRM vinculado — <strong>{f.alumno}</strong> · Folio #{f.crmFolio}
                {f.cursoRef&&<> · <span className="course-tag">{f.cursoRef}</span></>}
                <button style={{marginLeft:"auto",background:"none",border:"none",color:"var(--tx3)",cursor:"pointer",fontSize:11}} onClick={()=>set("crmFolio","")}>✕ Desvincular</button>
              </div>
            )}
          </div>

          <div className="fgrp" style={{gridColumn:"1/-1"}}><label className="flbl">Descripción *</label><input className="finp" placeholder="Ej: Mensualidad Junio 2026" value={f.desc} onChange={e=>set("desc",e.target.value)}/></div>
          <div className="fgrp"><label className="flbl">Monto Cobrado (MXN) *</label><input className="finp mono" type="number" min="0" step="0.01" placeholder="0.00" value={f.monto} onChange={e=>set("monto",e.target.value)}/></div>
          <div className="fgrp">
            <label className="flbl">Método de Pago</label>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {methods.map(([k,l])=><button key={k} className={`btn ${f.method===k?"btn-p":"btn-o"}`} style={{flex:1}} onClick={()=>set("method",k)}>{l}</button>)}
            </div>
          </div>
          {f.method==="card"&&mp&&parseFloat(f.monto)>0&&(
            <div style={{gridColumn:"1/-1"}}>
              <div className="cbox">
                <div style={{fontSize:11,fontWeight:700,color:"var(--am)",textTransform:"uppercase",letterSpacing:".6px",marginBottom:12}}>💳 Desglose Comisión — Mercado Pago Point</div>
                <div className="crow"><span style={{color:"var(--tx2)"}}>Monto cobrado al cliente</span><span className="mono">{fmt$(parseFloat(f.monto))}</span></div>
                <div className="crow"><span style={{color:"var(--tx2)"}}>Comisión MP (3.50%)</span><span className="mono tr2">-{fmt$(mp.comm)}</span></div>
                <div className="crow"><span style={{color:"var(--tx2)"}}>IVA sobre comisión (16%)</span><span className="mono tr2">-{fmt$(mp.iva)}</span></div>
                <div className="crow"><span style={{color:"var(--tx2)"}}>Total deducido por MP</span><span className="mono tr2">-{fmt$(mp.total)}</span></div>
                <div className="crow ctotal"><span>💰 Lo que llega a tu cuenta</span><span className="mono tg">{fmt$(mp.net)}</span></div>
                <div style={{fontSize:10,color:"var(--tx3)",marginTop:10}}>Tasa efectiva total: {((mp.total/parseFloat(f.monto))*100).toFixed(2)}% · Comisión: 3.50% + IVA (16% sobre comisión)</div>
              </div>
            </div>
          )}
          <div className="fgrp" style={{gridColumn:"1/-1"}}><label className="flbl">Notas</label><textarea className="finp" placeholder="Referencia, observaciones..." value={f.notas} onChange={e=>set("notas",e.target.value)}/></div>
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:18}}>
          <button className="btn btn-o" onClick={onClose}>Cancelar</button>
          <button className="btn btn-g" onClick={guardar} disabled={!f.date||!f.desc||!f.monto}>✓ Guardar Ingreso</button>
        </div>
      </div>
    </div>
  );
}

// ─── MODAL: AGREGAR GASTO FIJO ───────────────────────────────────────────────
function ModalGastoFijo({ onSave, onClose, expenseCats, initial }) {
  const cats = expenseCats || DEFAULT_EXPENSE_CATS;
  const [f,setF]=useState(initial||{desc:"",monto:"",dia:1,frecuencia:"mensual",diaSemana:1,cat:cats[0]||"Renta",notas:"",enDolares:false});
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const [newCat,setNewCat]=useState(""); const [showCat,setShowCat]=useState(false);
  function guardar(){ if(!f.desc||!f.monto) return; onSave({id:initial?.id||uid(),...f,monto:parseFloat(f.monto),dia:parseInt(f.dia)||1,diaSemana:parseInt(f.diaSemana)||0,frecuencia:f.frecuencia||"mensual",active:initial?.active!==undefined?initial.active:true,createdAt:initial?.createdAt||new Date().toISOString()}); }
  function addCat(){ if(newCat.trim()){ onSave({__addCat:newCat.trim()}); setNewCat(""); setShowCat(false); } }
  const RS='display:grid;grid-template-columns:1fr auto;align-items:center;gap:10px;padding:10px 13px;border:2px solid var(--br);border-radius:8px;cursor:pointer;font-size:13px;width:100%;boxSizing:border-box;background:var(--s2)';
  return(
    <div className="moverlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal" style={{maxWidth:520}}>
        <div className="mhdr"><div className="mtitle">{initial?"✏️ Editar Gasto Fijo":"📋 Nuevo Gasto Fijo"}</div><button className="mclose" onClick={onClose}>✕</button></div>
        <div className="fgrid">
          <div className="fgrp" style={{gridColumn:"1/-1"}}><label className="flbl">Descripción *</label><input className="finp" placeholder="Ej: Renta del local" value={f.desc} onChange={e=>set("desc",e.target.value)}/></div>
          <div className="fgrp">
            <label className="flbl">Monto *</label>
            <input className="finp mono" type="number" min="0" step="0.01" placeholder="0.00" value={f.monto} onChange={e=>set("monto",e.target.value)}/>
            <label style={{display:"flex",alignItems:"center",gap:6,marginTop:6,fontSize:12,cursor:"pointer",color:"var(--tx2)"}}>
              <input type="checkbox" checked={!!f.enDolares} onChange={e=>set("enDolares",e.target.checked)}/>
              💵 El monto está en USD (se convierte a MXN automáticamente)
            </label>
          </div>
          <div className="fgrp" style={{gridColumn:"1/-1"}}>
            <label className="flbl">Frecuencia de pago</label>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <label style={{display:f.frecuencia!=="semanal"?"grid":"grid",gridTemplateColumns:"1fr auto",alignItems:"center",gap:10,padding:"10px 13px",border:`2px solid var(--br)`,borderRadius:8,cursor:"pointer",fontSize:13,background:"var(--s2)"}}>
                <div>📅 Mensual — el mismo día cada mes</div>
                <input type="radio" name="gf-frecuencia" checked={(f.frecuencia||"mensual")==="mensual"} onChange={()=>set("frecuencia","mensual")} style={{width:16,height:16,flexShrink:0}}/>
              </label>
              {(f.frecuencia||"mensual")==="mensual"&&
                <div className="fgrp" style={{marginLeft:8}}><label className="flbl">Día de Pago (1-31)</label><input className="finp" type="number" min="1" max="31" value={f.dia} onChange={e=>set("dia",e.target.value)}/></div>
              }
              <label style={{display:"grid",gridTemplateColumns:"1fr auto",alignItems:"center",gap:10,padding:"10px 13px",border:`2px solid var(--br)`,borderRadius:8,cursor:"pointer",fontSize:13,background:"var(--s2)"}}>
                <div>🔁 Semanal — cada determinado día de la semana, como pago independiente</div>
                <input type="radio" name="gf-frecuencia" checked={f.frecuencia==="semanal"} onChange={()=>set("frecuencia","semanal")} style={{width:16,height:16,flexShrink:0}}/>
              </label>
              {f.frecuencia==="semanal"&&
                <div className="fgrp" style={{marginLeft:8}}>
                  <label className="flbl">Cada</label>
                  <select className="finp" value={f.diaSemana??1} onChange={e=>set("diaSemana",e.target.value)}>
                    {DIAS_SEMANA.map((d,i)=><option key={i} value={i}>{d}</option>)}
                  </select>
                  <div style={{fontSize:11,color:"var(--tx3)",marginTop:4}}>Cada {DIAS_SEMANA[f.diaSemana??1].toLowerCase()} aparecerá como un pago propio en Gastos Fijos.</div>
                </div>
              }
            </div>
          </div>
          <div className="fgrp" style={{gridColumn:"1/-1"}}>
            <label className="flbl">Categoría</label>
            <div style={{display:"flex",gap:6}}>
              <select className="finp" style={{flex:1}} value={f.cat} onChange={e=>set("cat",e.target.value)}>{cats.map(c=><option key={c}>{c}</option>)}</select>
              <button className="btn btn-o btn-sm" title="Nueva categoría" onClick={()=>setShowCat(!showCat)}>＋</button>
            </div>
            {showCat&&<div style={{display:"flex",gap:6,marginTop:6}}>
              <input className="finp" placeholder="Nombre de la nueva categoría" value={newCat} onChange={e=>setNewCat(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addCat()}/>
              <button className="btn btn-g btn-sm" onClick={addCat}>Agregar</button>
            </div>}
          </div>
          <div className="fgrp" style={{gridColumn:"1/-1"}}><label className="flbl">Notas</label><textarea className="finp" placeholder="Proveedor, referencia..." value={f.notas} onChange={e=>set("notas",e.target.value)}/></div>
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:18}}>
          <button className="btn btn-o" onClick={onClose}>Cancelar</button>
          <button className="btn btn-p" onClick={guardar} disabled={!f.desc||!f.monto}>✓ {initial?"Guardar cambios":"Agregar"}</button>
        </div>
      </div>
    </div>
  );
}

// ─── GRÁFICAS SVG (sin dependencias externas) ────────────────────────────────
function MiniBarChart({ data, height=200 }){
  if(!data||!data.length) return <div style={{height,display:"flex",alignItems:"center",justifyContent:"center",color:"var(--tx3)",fontSize:12}}>Sin datos</div>;
  const W=600,H=height,padL=42,padB=26,padT=10,padR=8;
  const innerW=W-padL-padR, innerH=H-padT-padB;
  const maxV=Math.max(1,...data.flatMap(d=>[d.ing||0,d.gst||0]));
  const niceMax=Math.max(1000,Math.ceil(maxV/1000)*1000);
  const n=data.length, groupW=innerW/n, barW=Math.min(20,groupW*0.32);
  const yTo=v=>padT+innerH-(v/niceMax)*innerH;
  const ticks=[0,0.25,0.5,0.75,1].map(f=>Math.round(niceMax*f));
  return(
    <div>
      <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",height,display:"block"}} preserveAspectRatio="xMidYMid meet">
        {ticks.map((t,i)=>(
          <g key={i}>
            <line x1={padL} x2={W-padR} y1={yTo(t)} y2={yTo(t)} stroke="var(--br)" strokeDasharray="3 3"/>
            <text x={padL-6} y={yTo(t)+3} textAnchor="end" fontSize="10" fill="var(--tx2)">{`$${(t/1000).toFixed(0)}k`}</text>
          </g>
        ))}
        {data.map((d,i)=>{
          const cx=padL+groupW*i+groupW/2;
          const hIng=(d.ing||0)/niceMax*innerH, hGst=(d.gst||0)/niceMax*innerH;
          return(
            <g key={i}>
              <rect x={cx-barW-2} y={padT+innerH-hIng} width={barW} height={Math.max(0,hIng)} fill="#10C98A" rx="3"><title>{`${d.m}: ${fmt$(d.ing||0)}`}</title></rect>
              <rect x={cx+2} y={padT+innerH-hGst} width={barW} height={Math.max(0,hGst)} fill="#F46B6B" rx="3"><title>{`${d.m}: ${fmt$(d.gst||0)}`}</title></rect>
              <text x={cx} y={H-8} textAnchor="middle" fontSize="10" fill="var(--tx2)">{d.m}</text>
            </g>
          );
        })}
      </svg>
      <div style={{display:"flex",gap:16,justifyContent:"center",marginTop:6,fontSize:11,color:"var(--tx2)"}}>
        <span><span style={{display:"inline-block",width:10,height:10,background:"#10C98A",borderRadius:2,marginRight:5,verticalAlign:"middle"}}/>Ingresos netos</span>
        <span><span style={{display:"inline-block",width:10,height:10,background:"#F46B6B",borderRadius:2,marginRight:5,verticalAlign:"middle"}}/>Gastos</span>
      </div>
    </div>
  );
}
function MiniPieChart({ data, colors, height=200 }){
  if(!data||!data.length) return <div style={{height,display:"flex",alignItems:"center",justifyContent:"center",color:"var(--tx3)",fontSize:12}}>Sin datos</div>;
  const total=data.reduce((s,d)=>s+(d.value||0),0)||1;
  const R=70,CX=85,CY=85;
  let acc=-90;
  const toXY=deg=>{const r=deg*Math.PI/180;return [CX+R*Math.cos(r),CY+R*Math.sin(r)];};
  const slices=data.map((d,i)=>{
    const frac=(d.value||0)/total, angle=frac*360, start=acc, end=acc+angle;
    acc=end;
    const large=angle>180?1:0;
    let path;
    if(frac>=0.9999){
      path=`M ${CX-R} ${CY} A ${R} ${R} 0 1 1 ${CX+R-0.01} ${CY} A ${R} ${R} 0 1 1 ${CX-R} ${CY} Z`;
    }else{
      const [x1,y1]=toXY(start),[x2,y2]=toXY(end);
      path=`M ${CX} ${CY} L ${x1} ${y1} A ${R} ${R} 0 ${large} 1 ${x2} ${y2} Z`;
    }
    const midDeg=start+angle/2, [lx,ly]=toXY.call(null,midDeg);
    const labelR=R*0.65, lrad=midDeg*Math.PI/180;
    return {d,path,color:colors[i%colors.length],pct:Math.round(frac*100),labelX:CX+labelR*Math.cos(lrad),labelY:CY+labelR*Math.sin(lrad)};
  });
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",height,justifyContent:"center"}}>
      <svg viewBox="0 0 170 170" style={{width:Math.min(height-30,170),height:Math.min(height-30,170)}}>
        {slices.map((s,i)=>(
          <g key={i}>
            <path d={s.path} fill={s.color} stroke="var(--bg)" strokeWidth="1.5"><title>{`${s.d.name}: ${fmt$(s.d.value)} (${s.pct}%)`}</title></path>
            {s.pct>=6&&<text x={s.labelX} y={s.labelY} textAnchor="middle" dominantBaseline="middle" fontSize="9" fill="#0a0f1a" fontWeight="700">{s.pct}%</text>}
          </g>
        ))}
      </svg>
      <div style={{display:"flex",flexWrap:"wrap",gap:"4px 12px",justifyContent:"center",marginTop:8,fontSize:11,color:"var(--tx2)",maxWidth:260}}>
        {slices.map((s,i)=>(
          <span key={i} style={{display:"flex",alignItems:"center",gap:5}}>
            <span style={{width:9,height:9,borderRadius:"50%",background:s.color,display:"inline-block"}}/>
            {s.d.name} ({s.pct}%)
          </span>
        ))}
      </div>
    </div>
  );
}

    .sort((a,b)=>b.date.localeCompare(a.date))

  const tots=useMemo(()=>({

// ─── VISTA: ALUMNOS CRM ──────────────────────────────────────────────────────
function AlumnosCRM({ crmData, ingresos, setIngresos }) {
  const [q, setQ] = useState("");
  const [showModal, setShowModal] = useState(false);
  const [prefill, setPrefill] = useState(null);
  const [filtroCurso, setFiltroCurso] = useState("todos");
  const cm = monthStr();
  const cmLabel = new Date().toLocaleDateString("es-MX",{month:"long",year:"numeric"});

  const cursos = useMemo(()=>{
    if (!crmData?.cursos) return [];
    return crmData.cursos.map(c=>c.nombre||c.name||"").filter(Boolean);
  },[crmData]);

  // Agrupar matrículas: un registro por alumno, mostrando todos sus cursos
  const alumnos = useMemo(()=>{
    if (!crmData?.matrículas) return [];
    const map = {};
    crmData.matrículas.forEach(m=>{
      if (!map[m.alumno]) map[m.alumno]={ alumno:m.alumno, cursos:[], folios:[], email:m.email||"", titular:m.titular||"" };
      map[m.alumno].cursos.push(m.curso);
      map[m.alumno].folios.push(m.folio);
    });
    return Object.values(map).sort((a,b)=>a.alumno.localeCompare(b.alumno));
  },[crmData]);

  // Pagos del mes actual: combina ingresos manuales + pagos del CRM (pagosRegulares)
  const pagadosMes = useMemo(()=>{
    const s = new Set();
    // Pagos manuales en la app contable
    ingresos.filter(i=>i.date.startsWith(cm)&&i.alumno).forEach(i=>s.add(i.alumno));
    // Pagos registrados directamente en el CRM (nueva pestaña Pagos Regulares)
    (crmData?.pagosRegulares||[]).filter(p=>(p.fecha?.startsWith(cm)||p.fechaISO?.startsWith(cm))).forEach(p=>s.add(p.alumnoNombre));
    return s;
  },[ingresos,crmData,cm]);

  const ingPorAlumno = useMemo(()=>{
    const m = {};
    ingresos.filter(i=>i.alumno).forEach(i=>{
      if (!m[i.alumno]) m[i.alumno]={ total:0, neto:0, count:0 };
      m[i.alumno].total += i.monto; m[i.alumno].neto += i.neto; m[i.alumno].count++;
    });
    return m;
  },[ingresos]);

  const filtrados = useMemo(()=>
    alumnos
      .filter(a=>!q||a.alumno.toLowerCase().includes(q.toLowerCase()))
      .filter(a=>filtroCurso==="todos"||a.cursos.includes(filtroCurso))
  ,[alumnos,q,filtroCurso]);

  const pagados = filtrados.filter(a=>pagadosMes.has(a.alumno)).length;
  const pendientes = filtrados.filter(a=>!pagadosMes.has(a.alumno)).length;

  async function guardarIngreso(inc){
    const upd=[...ingresos,inc];
    setIngresos(upd); await stor("set","ingresos",upd); setShowModal(false); setPrefill(null);
  }

  function abrirModalPago(a) {
    // Pre-llenar con datos del primer curso del alumno
    const folio = a.folios[0];
    const curso = a.cursos[0];
    const mat = crmData?.matrículas?.find(m=>m.folio===folio);
    const costo = crmCostoCurso(crmData, curso);
    setPrefill({
      alumno: a.alumno,
      cursoRef: curso,
      crmFolio: String(folio),
      monto: costo > 0 ? costo.toString() : "",
      desc: `Mensualidad ${cmLabel} — ${curso}`,
    });
    setShowModal(true);
  }

  function procesarPagoCRM(a, pago) {
    // Un pago ya existe en el CRM (pagosRegulares) pero aún no se registró en la contabilidad.
    // Prellenamos con los datos reales del pago para que solo falte elegir el método (efectivo/transferencia/MP).
    const curso = pago.curso || a.cursos[0];
    const fecha = (pago.fecha || pago.fechaISO || todayStr()).slice(0,10);
    setPrefill({
      alumno: a.alumno,
      cursoRef: curso,
      crmFolio: String(pago.crmFolio || a.folios[0] || ""),
      monto: String(pago.montoFinal || pago.monto || ""),
      date: fecha,
      desc: `Mensualidad ${cmLabel} — ${curso}`,
    });
    setShowModal(true);
  }

  if (!crmData) return (
    <div>
      <div className="sec-ttl" style={{marginBottom:14}}>🔗 Alumnos del CRM</div>
      <div className="crm-off">
        <span style={{fontSize:20}}>🔌</span>
        <div>
          <div style={{fontWeight:600,color:"var(--tx)"}}>CRM no conectado</div>
          <div style={{color:"var(--tx2)"}}>Abre el CRM (NOVA IA Academy) en el chat para sincronizar alumnos y cursos automáticamente.</div>
        </div>
      </div>
    </div>
  );

  return(
    <div>
      {showModal&&<ModalIngreso crmData={crmData} prefill={prefill} onSave={guardarIngreso} onClose={()=>{setShowModal(false);setPrefill(null);}}/>}

      <div className="sec-hdr">
        <div>
          <div className="sec-ttl">🎓 Alumnos del CRM</div>
          <div style={{fontSize:11,color:"var(--tx2)",marginTop:2}}>Sincronizado desde NOVA IA Academy CRM · {cmLabel}</div>
        </div>
      </div>

      {/* Stats rápidos */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:10,marginBottom:14}}>
        {[
          {l:"Total alumnos",v:alumnos.length,c:"var(--tx)"},
          {l:"✓ Pagaron este mes",v:pagados,c:"var(--gr)"},
          {l:"⚠ Sin pago este mes",v:pendientes,c:pendientes>0?"var(--rd)":"var(--tx2)"},
          {l:"Cursos registrados",v:cursos.length,c:"var(--pu)"},
        ].map(({l,v,c})=>(
          <div key={l} className="mini-stat"><div className="ms-label">{l}</div><div className="ms-val" style={{color:c,fontSize:22,fontFamily:"var(--mono)"}}>{v}</div></div>
        ))}
      </div>

      {/* Morosos alert */}
      {pendientes > 0 && (
        <div className="alert al-rd" style={{marginBottom:14}}>
          <span style={{fontSize:20}}>⚠️</span>
          <div>
            <div style={{fontWeight:700,color:"var(--tx)"}}>
              {pendientes} alumno(s) sin pago registrado en {cmLabel}
            </div>
            <div style={{fontSize:12,opacity:.85,marginTop:2}}>
              Usa el botón "💰 Registrar pago" para registrar su mensualidad.
            </div>
          </div>
        </div>
      )}

      {/* Filtros */}
      <div className="fbar" style={{marginBottom:14}}>
        <input className="finput" type="text" placeholder="🔍 Buscar alumno..." value={q} onChange={e=>setQ(e.target.value)} style={{flex:1}}/>
        <select className="finput" value={filtroCurso} onChange={e=>setFiltroCurso(e.target.value)}>
          <option value="todos">Todos los cursos</option>
          {cursos.map(c=><option key={c}>{c}</option>)}
        </select>
        <button className="btn btn-o btn-sm" onClick={()=>{setQ("");setFiltroCurso("todos");}}>Limpiar</button>
      </div>

      {/* Lista de alumnos */}
      {filtrados.length === 0 ? (
        <div className="empty"><div className="empty-icon">🎓</div><div className="empty-ttl">Sin resultados</div></div>
      ) : (
        <div className="card" style={{padding:0}}>
          {filtrados.map(a=>{
            const pagado = pagadosMes.has(a.alumno);
            // Check if payment came from CRM pagosRegulares
            const procesados = new Set(ingresos.filter(i=>i.crmFolio).map(i=>String(i.crmFolio)));
            const pagoCRM = (crmData?.pagosRegulares||[]).filter(p=>p.alumnoNombre===a.alumno&&(p.fecha?.startsWith(cm)||p.fechaISO?.startsWith(cm))&&!procesados.has(String(p.crmFolio)));
            const pagoManual = ingresos.filter(i=>i.alumno===a.alumno&&i.date.startsWith(cm));
            const hist = ingPorAlumno[a.alumno];
            // Histórico CRM excluye pagos ya "procesados" (convertidos a ingreso) para no contarlos doble
            const histCRM = (crmData?.pagosRegulares||[]).filter(p=>p.alumnoNombre===a.alumno&&!procesados.has(String(p.crmFolio)));
            const totalCRM = histCRM.reduce((s,p)=>s+(p.montoFinal||0),0);
            return(
              <div key={a.alumno} className={`alm-row ${pagado?"alm-paid":"alm-due"}`}>
                <div className="alm-avatar">{a.alumno.split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase()}</div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:600,fontSize:14}}>{a.alumno}</div>
                  <div style={{display:"flex",gap:6,marginTop:4,flexWrap:"wrap"}}>
                    {a.cursos.map(c=><span key={c} className="course-tag">{c}</span>)}
                  </div>
                  {a.email&&<div style={{fontSize:11,color:"var(--tx3)",marginTop:3}}>✉ {a.email}</div>}
                  {(hist||totalCRM>0)&&<div style={{fontSize:11,color:"var(--tx2)",marginTop:3}}>
                    Histórico: <span style={{fontFamily:"var(--mono)",color:"var(--gr)"}}>{fmt$((hist?.neto||0)+totalCRM)}</span>
                    {hist?.count>0&&<span style={{color:"var(--tx3)"}}> ({hist.count} manual{histCRM.length>0?`, ${histCRM.length} CRM`:""})</span>}
                  </div>}
                </div>
                <div style={{textAlign:"right",flexShrink:0}}>
                  {pagado ? (
                    <div>
                      {pagoCRM.length>0&&<div style={{marginBottom:4,display:"flex",alignItems:"center",gap:6,justifyContent:"flex-end"}}><span className="badge b-crm" style={{fontSize:10}}>💳 CRM: {fmt$(pagoCRM.reduce((s,p)=>s+(p.montoFinal||0),0))}</span>{pagoManual.length===0&&<button className="btn btn-o btn-sm" style={{fontSize:10,padding:"2px 6px"}} onClick={()=>procesarPagoCRM(a,pagoCRM[0])} title="Registrar este cobro en la contabilidad (elegir método de pago)">→ Contabilidad</button>}</div>}
                      {pagoManual.length>0&&<div style={{marginBottom:4}}><span className="badge b-gr" style={{fontSize:10}}>✓ App: {fmt$(pagoManual.reduce((s,i)=>s+i.neto,0))}</span></div>}
                      {pagoCRM.length===0&&pagoManual.length===0&&<span className="badge b-gr">✓ Pagado este mes</span>}
                    </div>
                  ) : (
                    <button className="btn btn-g btn-sm" onClick={()=>abrirModalPago(a)}>💰 Registrar pago</button>
                  )}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── VISTA: GASTOS FIJOS ─────────────────────────────────────────────────────
function GastosFijos({ gastosFijos, setGastosFijos, pagosGastos, setPagosGastos, expenseCats, addExpenseCat, showMoney }) {
  const cats = expenseCats || DEFAULT_EXPENSE_CATS;
  const [showForm,setShowForm]=useState(false);
  const [editando,setEditando]=useState(null);
  const [pagando,setPagando]=useState(null);
  const cm=monthStr();
  const cmLabel=new Date().toLocaleDateString("es-MX",{month:"long",year:"numeric"});

  const conEstado=useMemo(()=>{
    const hoyISO=todayStr();
    const out=[];
    gastosFijos.filter(fe=>fe.active).forEach(fe=>{
      ocurrenciasGasto(fe,cm).forEach(fecha=>{
        const paid=pagoDeOcurrencia(fe,fecha,pagosGastos);
        const diff=Math.round((new Date(fecha+'T00:00:00')-new Date(hoyISO+'T00:00:00'))/86400000);
        out.push({...fe,_fecha:fecha,paid,isOverdue:!paid&&diff<0,isDueSoon:!paid&&diff>=0&&diff<=7,daysLeft:diff});
      });
    });
    return out.sort((a,b)=>{
      if(a.isOverdue&&!b.isOverdue)return -1; if(!a.isOverdue&&b.isOverdue)return 1;
      if(a.isDueSoon&&!b.isDueSoon)return -1; if(!a.isDueSoon&&b.isDueSoon)return 1;
      return a._fecha.localeCompare(b._fecha);
    });
  },[gastosFijos,pagosGastos,cm]);

  const totFijo=conEstado.reduce((s,e)=>s+e.monto,0);
  const totPagado=conEstado.filter(e=>e.paid).reduce((s,e)=>s+e.monto,0);
  const totPend=conEstado.filter(e=>!e.paid).reduce((s,e)=>s+e.monto,0);

  async function handleSave(g){
    if(g.__addCat){ await addExpenseCat(g.__addCat); return; }
    let upd;
    if(editando){ upd=gastosFijos.map(fe=>fe.id===g.id?g:fe); setEditando(null); }
    else { upd=[...gastosFijos,g]; setShowForm(false); }
    setGastosFijos(upd); await stor("set","gastosFijos",upd);
  }
  async function desactivar(id){
    if(!confirm("¿Desactivar este gasto fijo?")) return;
    const upd=gastosFijos.map(fe=>fe.id===id?{...fe,active:false}:fe);
    setGastosFijos(upd); await stor("set","gastosFijos",upd);
  }
  async function reactivar(id){
    const upd=gastosFijos.map(fe=>fe.id===id?{...fe,active:true}:fe);
    setGastosFijos(upd); await stor("set","gastosFijos",upd);
  }
  async function pagar({fecha,monto,notas},gasto){
    const pago={id:uid(),gastoId:gasto.id,desc:gasto.desc,monto,fecha,date:fecha,cat:gasto.cat,notas,createdAt:new Date().toISOString()};
    if((gasto.frecuencia||"mensual")==="semanal") pago.ocurrencia=gasto._fecha;
    else pago.mes=cm;
    const upd=[...pagosGastos,pago];
    setPagosGastos(upd); await stor("set","pagosGastos",upd); setPagando(null);
  }
  const disp=showMoney||fmt$;

  return(
    <div>
      {(showForm||editando)&&<ModalGastoFijo expenseCats={cats} initial={editando||undefined} onSave={handleSave} onClose={()=>{setShowForm(false);setEditando(null);}}/>}
      {pagando&&<ModalPagarGasto gasto={pagando} onSave={(d)=>pagar(d,pagando)} onClose={()=>setPagando(null)}/>}

      <div className="sec-hdr">
        <div className="sec-ttl">📋 Gastos Fijos</div>
        <button className="btn btn-p" onClick={()=>setShowForm(true)}>+ Agregar Gasto Fijo</button>
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:10,marginBottom:16}}>
        {[{l:"Total fijo / mes",v:disp(totFijo),c:"var(--tx)"},{l:"Pagado — "+new Date().toLocaleDateString("es-MX",{month:"short"}),v:disp(totPagado),c:"var(--gr)"},{l:"Pendiente de pago",v:disp(totPend),c:totPend>0?"var(--rd)":"var(--tx2)"}].map(({l,v,c})=>(
          <div key={l} className="mini-stat"><div className="ms-label">{l}</div><div className="ms-val" style={{color:c}}>{v}</div></div>
        ))}
      </div>

      <div style={{fontSize:12,color:"var(--tx2)",marginBottom:12}}>Estado — <strong style={{color:"var(--tx)",textTransform:"capitalize"}}>{cmLabel}</strong></div>

      {conEstado.length===0?(
        <div className="empty"><div className="empty-icon">📋</div><div className="empty-ttl">Sin gastos fijos</div><div className="empty-sub">Agrega renta, servicios, internet, salarios, etc.</div></div>
      ):(
        conEstado.map(fe=>(
          <div key={fe.id+'_'+fe._fecha} className="exp-item" style={{borderColor:fe.isOverdue?"var(--rd)":fe.isDueSoon?"var(--am)":fe.paid?"rgba(16,201,138,.4)":"var(--br)"}}>
            <div style={{flex:1,minWidth:180}}>
              <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                <span style={{fontWeight:600,fontSize:15}}>{fe.desc}</span>
                {fe.paid?<span className="badge b-gr">✓ Pagado</span>:fe.isOverdue?<span className="badge b-rd">🚨 Vencido</span>:fe.isDueSoon?<span className="badge b-am">⏰ Próximo</span>:<span className="badge b-gy">Pendiente</span>}
              </div>
              <div style={{fontSize:11,color:"var(--tx2)",marginTop:5,display:"flex",gap:12,flexWrap:"wrap"}}>
                <span>📂 {fe.cat}</span>
                {(fe.frecuencia||"mensual")==="semanal"
                  ?<span>📅 {DIAS_SEMANA[new Date(fe._fecha+'T00:00:00').getDay()]} {fmtD(fe._fecha)}</span>
                  :<span>📅 Día {fe.dia} c/mes</span>}
                {fe.paid&&<span style={{color:"var(--gr)"}}>🗓 Pagado el {fmtD(fe.paid.fecha)}</span>}
                {!fe.paid&&fe.daysLeft===0&&<span style={{color:"var(--am)"}}>¡Vence hoy!</span>}
                {!fe.paid&&fe.daysLeft>0&&<span style={{color:fe.isDueSoon?"var(--am)":"var(--tx3)"}}>Vence en {fe.daysLeft} día(s)</span>}
                {!fe.paid&&fe.daysLeft<0&&<span style={{color:"var(--rd)"}}>Vencido hace {Math.abs(fe.daysLeft)} día(s)</span>}
              </div>
              {fe.notas&&<div style={{fontSize:10,color:"var(--tx3)",marginTop:4}}>{fe.notas}</div>}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{textAlign:"right"}}>
                <div className="mono" style={{fontSize:18,fontWeight:700}}>{fmt$(fe.monto)}</div>
                <div style={{fontSize:10,color:"var(--tx3)"}}>{(fe.frecuencia||"mensual")==="semanal"?"semanal":"mensual"}</div>
              </div>
              {!fe.paid&&<button className="btn btn-g btn-sm" onClick={()=>setPagando(fe)}>✓ Pagar</button>}
              <button className="btn btn-o btn-sm" onClick={()=>setEditando(gastosFijos.find(g=>g.id===fe.id))} title="Editar">✏️</button>
              <button className="btn btn-d btn-sm" onClick={()=>desactivar(fe.id)} title="Desactivar">🗑</button>
            </div>
          </div>
        ))
      )}

      {gastosFijos.filter(fe=>!fe.active).length>0&&(
        <details style={{marginTop:18}}>
          <summary style={{cursor:"pointer",color:"var(--tx2)",fontSize:12,padding:"6px 0"}}>Gastos desactivados ({gastosFijos.filter(fe=>!fe.active).length})</summary>
          <div style={{marginTop:8}}>
            {gastosFijos.filter(fe=>!fe.active).map(fe=>(
              <div key={fe.id} style={{background:"var(--s1)",border:"1px solid var(--br)",borderRadius:8,padding:"10px 14px",marginBottom:8,opacity:.5,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontWeight:500}}>{fe.desc}</span>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  <span className="mono" style={{fontSize:13}}>{fmt$(fe.monto)}</span>
                  <button className="btn btn-o btn-sm" onClick={()=>reactivar(fe.id)}>Reactivar</button>
                </div>
              </div>
            ))}
          </div>
        </details>
      )}
    </div>
  );
}

// ─── MODAL: CONFIRMAR PAGO DE COMISIÓN ────────────────────────────────────────

    <div className="moverlay" onClick={e=>e.target===e.currentTarget&&onClose()}>

        <div style={{background:"var(--s2)",borderRadius:8,padding:"12px 14px",marginBottom:16}}>

          <div style={{fontSize:12,color:"var(--tx2)",marginTop:3}}>{comision.count} contrato{comision.count!==1?"s":""} creado{comision.count!==1?"s":""} en {mesLabel(comision.mesGanado)}</div>
          <div className="mono" style={{fontSize:22,fontWeight:800,marginTop:8,color:"var(--gr)"}}>{fmt$(comision.monto)}</div>

          Este monto se registrará como gasto en <strong>{mesLabel(comision.mesPago)}</strong> (mes en que sale el dinero de la cuenta).
        </div>
        <div style={{display:"flex",gap:10,justifyContent:"flex-end",marginTop:18}}>
