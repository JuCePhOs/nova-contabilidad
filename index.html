        </div>
      </div>
    </div>
  );
}

// ─── VISTA: COMISIONES DE EMPLEADOS ──────────────────────────────────────────
function ComisionesEmpleados({ crmData, pagosGastos, setPagosGastos, showMoney }) {
  const [pagando,setPagando]=useState(null);
  const [filtro,setFiltro]=useState("todas"); // todas | pendientes | pagadas
  const disp=showMoney||fmt$;
  const mesLabel=(ym)=>{
    const[y,m]=ym.split('-');
    const n=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    return `${n[parseInt(m)-1]} ${y}`;
  };

  const comisiones=useMemo(()=>calcComisiones(crmData),[crmData]);

  function yaPagado(c){
    return pagosGastos.find(p=>p.cat==="Comisiones"&&p.comisionUsuario===c.usuario&&p.comisionMesGanado===c.mesGanado);
  }

  async function confirmarPago(c,fecha){
    const pago={
      id:uid(), gastoId:null,
      desc:`Comisión ${c.nombreUsuario} — ${mesLabel(c.mesGanado)} (${c.count} contrato${c.count!==1?"s":""})`,
      monto:c.monto, fecha, date:fecha, mes:c.mesPago, cat:"Comisiones",
      notas:`Folios: ${c.folios.join(", ")}`,
      createdAt:new Date().toISOString(),
      comisionUsuario:c.usuario, comisionMesGanado:c.mesGanado, comisionFolios:c.folios,
    };
    const upd=[...pagosGastos,pago];
    setPagosGastos(upd); await stor("set","pagosGastos",upd);
    setPagando(null);
  }

  if(!crmData?.matrículas){
    return(
      <div className="empty">
        <div className="empty-icon">💼</div>
        <div className="empty-ttl">Conecta el CRM</div>
        <div className="empty-sub">Las comisiones se calculan a partir de las matrículas y pagos del CRM.</div>
      </div>
    );
  }

  const conEstado=comisiones.map(c=>({...c,pagado:yaPagado(c)}));
  const visibles=conEstado.filter(c=>filtro==="todas"||(filtro==="pendientes"&&!c.pagado)||(filtro==="pagadas"&&c.pagado));

  const totalPendiente=conEstado.filter(c=>!c.pagado).reduce((s,c)=>s+c.monto,0);
  const totalPagadoHist=conEstado.filter(c=>c.pagado).reduce((s,c)=>s+c.monto,0);
  const nEjecutivos=new Set(conEstado.map(c=>c.usuario)).size;
  const cm=monthStr();
  const proximoPago=conEstado.filter(c=>!c.pagado&&c.mesPago<=nextMonth(cm)).reduce((s,c)=>s+c.monto,0);

  return(
    <div>
      {pagando&&<ModalConfirmarComision comision={pagando} onSave={(f)=>confirmarPago(pagando,f)} onClose={()=>setPagando(null)}/>}

      <div className="sec-hdr">
        <div className="sec-ttl">💼 Comisiones de Empleados</div>
      </div>

      <div style={{background:"var(--s2)",border:"1px solid var(--br)",borderRadius:10,padding:"12px 14px",marginBottom:16,fontSize:12,color:"var(--tx2)",lineHeight:1.6}}>
        💡 Cada <strong style={{color:"var(--tx)"}}>contrato creado y con pago confirmado</strong> genera una comisión única de <strong style={{color:"var(--gr)"}}>{fmt$(COMISION_POR_CONTRATO)}</strong> para el usuario que lo registró.
        Las comisiones de un mes se liquidan el <strong style={{color:"var(--tx)"}}>día 15 del mes siguiente</strong>, y ese gasto se contabiliza en el mes en que se paga (mes vencido).
      </div>

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:10,marginBottom:16}}>
        <div className="mini-stat"><div className="ms-label">Pendiente de pago</div><div className="ms-val" style={{color:"var(--am)"}}>{disp(totalPendiente)}</div></div>
        <div className="mini-stat"><div className="ms-label">Próxima liquidación (15 de {mesLabel(nextMonth(cm))})</div><div className="ms-val" style={{color:"var(--rd)"}}>{disp(proximoPago)}</div></div>
        <div className="mini-stat"><div className="ms-label">Pagado histórico</div><div className="ms-val" style={{color:"var(--gr)"}}>{disp(totalPagadoHist)}</div></div>
        <div className="mini-stat"><div className="ms-label">Ejecutivos con comisión</div><div className="ms-val">{nEjecutivos}</div></div>
      </div>

      <div style={{display:"flex",gap:8,marginBottom:14}}>
        {[["todas","Todas"],["pendientes","Pendientes"],["pagadas","Pagadas"]].map(([v,l])=>(
          <button key={v} className={`btn btn-sm ${filtro===v?"btn-p":"btn-o"}`} onClick={()=>setFiltro(v)}>{l}</button>
        ))}
      </div>

      {visibles.length===0?(
        <div className="empty"><div className="empty-icon">💼</div><div className="empty-ttl">Sin comisiones {filtro==="pendientes"?"pendientes":filtro==="pagadas"?"pagadas":"registradas"}</div><div className="empty-sub">Aparecerán aquí cuando se creen y confirmen contratos en el CRM.</div></div>
      ):(
        visibles.map(c=>(
          <div key={c.usuario+c.mesGanado} className="exp-item" style={{borderColor:c.pagado?"rgba(16,201,138,.4)":"var(--br)"}}>
            <div style={{flex:1,minWidth:180}}>
              <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                <span style={{fontWeight:600,fontSize:15}}>{c.nombreUsuario}</span>
                {c.pagado?<span className="badge b-gr">✓ Pagado</span>:<span className="badge b-am">⏳ Pendiente</span>}
              </div>
              <div style={{fontSize:11,color:"var(--tx2)",marginTop:5,display:"flex",gap:12,flexWrap:"wrap"}}>
                <span>📅 Contratos de {mesLabel(c.mesGanado)}</span>
                <span>📄 {c.count} contrato{c.count!==1?"s":""}</span>
                <span>💵 {fmt$(COMISION_POR_CONTRATO)} c/u</span>
                {c.pagado
                  ?<span style={{color:"var(--gr)"}}>🗓 Pagado el {fmtD(c.pagado.fecha)}</span>
                  :<span style={{color:"var(--am)"}}>🗓 Pagar el 15 de {mesLabel(c.mesPago)}</span>}
              </div>
              <details style={{marginTop:6}}>
                <summary style={{cursor:"pointer",fontSize:10,color:"var(--tx3)"}}>Ver folios ({c.folios.length})</summary>
                <div style={{fontSize:11,color:"var(--tx2)",marginTop:4}}>{c.folios.map(f=>`#${f}`).join(", ")}</div>
              </details>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{textAlign:"right"}}>
                <div className="mono" style={{fontSize:18,fontWeight:700}}>{disp(c.monto)}</div>
                <div style={{fontSize:10,color:"var(--tx3)"}}>comisión</div>
              </div>
              {!c.pagado&&<button className="btn btn-g btn-sm" onClick={()=>setPagando(c)}>✓ Marcar pagado</button>}
            </div>
          </div>
        ))
      )}
    </div>
  );
}


// ─── VISTA: HISTORIAL ────────────────────────────────────────────────────────
function Historial({ ingresos, pagosGastos }) {
  const [mes,setMes]=useState(monthStr());
  const [tipo,setTipo]=useState("todo");
  const [q,setQ]=useState("");

  const all=useMemo(()=>{
    const inc=ingresos.map(i=>({...i,tipo:"ingreso",fecha:i.date,display:i.monto,netDisplay:i.neto}));
    const gst=pagosGastos.map(g=>({...g,tipo:"gasto",fecha:g.fecha||g.date,display:-g.monto,netDisplay:-g.monto,cat:g.cat}));
    return[...inc,...gst]
      .filter(t=>!mes||t.fecha?.startsWith(mes))
      .filter(t=>tipo==="todo"||t.tipo===tipo)
      .filter(t=>!q||t.desc?.toLowerCase().includes(q.toLowerCase())||(t.alumno||"").toLowerCase().includes(q.toLowerCase()))
      .sort((a,b)=>(b.fecha||"").localeCompare(a.fecha||""));
  },[ingresos,pagosGastos,mes,tipo,q]);

  const totInc=all.filter(t=>t.tipo==="ingreso").reduce((s,t)=>s+t.neto,0);
  const totGst=all.filter(t=>t.tipo==="gasto").reduce((s,t)=>s+t.monto,0);

  return(
    <div>
      <div className="sec-ttl" style={{marginBottom:14}}>📜 Historial de Transacciones</div>
      <div className="fbar">
        <input className="finput" type="month" value={mes} onChange={e=>setMes(e.target.value)}/>
        <select className="finput" value={tipo} onChange={e=>setTipo(e.target.value)}>
          <option value="todo">Todos</option><option value="ingreso">Solo Ingresos</option><option value="gasto">Solo Gastos</option>
        </select>
        <input className="finput" type="text" placeholder="🔍 Buscar..." value={q} onChange={e=>setQ(e.target.value)} style={{flex:1,minWidth:150}}/>
        {mes&&<button className="btn btn-o btn-sm" onClick={()=>setMes("")}>Todos los meses</button>}
      </div>

      {all.length>0&&(
        <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
          {[{l:"Ingresos netos:",v:fmt$(totInc),c:"var(--gr)"},{l:"Total gastos:",v:fmt$(totGst),c:"var(--rd)"},{l:"Balance:",v:(totInc-totGst>=0?"+":"")+fmt$(totInc-totGst),c:totInc-totGst>=0?"var(--gr)":"var(--rd)"}].map(({l,v,c})=>(
            <div key={l} style={{background:"var(--s1)",border:"1px solid var(--br)",borderRadius:8,padding:"8px 14px",fontSize:13}}>
              <span style={{color:"var(--tx2)"}}>{l} </span><span style={{color:c,fontFamily:"var(--mono)",fontWeight:600}}>{v}</span>
            </div>
          ))}
        </div>
      )}

      {all.length===0?(
        <div className="empty"><div className="empty-icon">📜</div><div className="empty-ttl">Sin transacciones</div><div className="empty-sub">No hay registros para los filtros seleccionados</div></div>
      ):(
        <div className="card" style={{padding:0}}>
          <div className="twrap">
            <table>
              <thead><tr><th>Fecha</th><th>Tipo</th><th>Descripción</th><th>Categoría</th><th className="tr">Importe</th><th className="tr">Neto</th></tr></thead>
              <tbody>
                {all.map(t=>(
                  <tr key={t.id}>
                    <td className="mono" style={{fontSize:11}}>{fmtD(t.fecha)}</td>
                    <td><span className={`badge ${t.tipo==="ingreso"?"b-gr":"b-rd"}`}>{t.tipo==="ingreso"?"↑ Ingreso":"↓ Gasto"}</span></td>
                    <td>
                      <div style={{fontWeight:500,fontSize:13}}>{t.desc}</div>
                      {t.alumno&&<div style={{fontSize:10,color:"var(--tx3)"}}>👤 {t.alumno}</div>}
                      {t.tipo==="ingreso"&&t.method==="card"&&<div style={{fontSize:10,color:"var(--rd)"}}>Comisión MP: -{fmt$(t.totalDed)}</div>}
                    </td>
                    <td><span className="badge b-gy">{t.cat}</span></td>
                    <td className="mono tr" style={{color:t.tipo==="ingreso"?"var(--tx)":"var(--rd)"}}>{t.tipo==="ingreso"?fmt$(t.monto):"-"+fmt$(t.monto)}</td>
                    <td className="mono tr" style={{color:t.tipo==="ingreso"?"var(--gr)":"var(--rd)",fontWeight:600}}>{t.tipo==="ingreso"?fmt$(t.neto):"-"+fmt$(t.monto)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

// ─── VISTA: REPORTES ─────────────────────────────────────────────────────────
function Reportes({ ingresos, pagosGastos }) {
  const monthly=useMemo(()=>
    Array.from({length:12},(_,i)=>{
      const d=new Date(); d.setDate(1); d.setMonth(d.getMonth()-11+i);
      const ym=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
      const inc=ingresos.filter(x=>x.date.startsWith(ym));
      const exp=pagosGastos.filter(x=>x.mes===ym);
      const ing=+inc.reduce((s,x)=>s+x.neto,0).toFixed(2);
      const gst=+exp.reduce((s,x)=>s+x.monto,0).toFixed(2);
      return{m:d.toLocaleDateString("es-MX",{month:"short",year:"2-digit"}),ing,gst,bal:+(ing-gst).toFixed(2),n:inc.length};
    })
  ,[ingresos,pagosGastos]);

  const catInc=useMemo(()=>{const c={};ingresos.forEach(i=>{c[i.cat]=(c[i.cat]||0)+i.monto;});return Object.entries(c).sort((a,b)=>b[1]-a[1]).map(([name,value])=>({name,value:+value.toFixed(2)}));},[ingresos]);
  const catGst=useMemo(()=>{const c={};pagosGastos.forEach(g=>{c[g.cat]=(c[g.cat]||0)+g.monto;});return Object.entries(c).sort((a,b)=>b[1]-a[1]).map(([name,value])=>({name,value:+value.toFixed(2)}));},[pagosGastos]);
  const metodos=useMemo(()=>{const m={Efectivo:0,Transferencia:0,"Terminal MP":0};ingresos.forEach(i=>{m[i.method==="cash"?"Efectivo":i.method==="transfer"?"Transferencia":"Terminal MP"]+=i.monto;});return Object.entries(m).filter(([,v])=>v>0).map(([name,value])=>({name,value:+value.toFixed(2)}));},[ingresos]);

  const P1=["#22D4EF","#10C98A","#9B72F8","#F5C147","#EC4899","#6EE7B7"];
  const P2=["#F46B6B","#FB923C","#F5C147","#34D399","#60A5FA","#A78BFA","#F472B6","#94A3B8"];
  const totInc=ingresos.reduce((s,i)=>s+i.neto,0);
  const totGst=pagosGastos.reduce((s,g)=>s+g.monto,0);
  const totComm=ingresos.filter(i=>i.method==="card").reduce((s,i)=>s+(i.totalDed||0),0);
  const Tip=({active,payload,label})=>active&&payload?.length?(<div className="ctooltip"><div style={{fontWeight:600,marginBottom:4}}>{label}</div>{payload.map((p,i)=><div key={i} style={{color:p.color}}>{p.name}: {fmt$(p.value)}</div>)}</div>):null;

  return(
    <div>
      <div className="sec-ttl" style={{marginBottom:14}}>📊 Reportes y Análisis</div>
      <div className="sgrid">
        {[
          {label:"Ingresos Brutos Histórico",val:fmt$(ingresos.reduce((s,i)=>s+i.monto,0)),sub:"Total cobrado",stripe:"var(--gr)",vcol:"var(--gr)"},
          {label:"Ingresos Netos Histórico",val:fmt$(totInc),sub:"Lo que llega a tu cuenta",stripe:"var(--ac)",vcol:"var(--ac)"},
          {label:"Gastos Totales Histórico",val:fmt$(totGst),sub:"Suma de pagos registrados",stripe:"var(--rd)",vcol:"var(--rd)"},
          {label:"Comisiones Mercado Pago",val:fmt$(totComm),sub:"Total pagado en comisiones",stripe:"var(--am)",vcol:"var(--am)"},
        ].map(({label,val,sub,stripe,vcol})=>(
          <div key={label} className="scard" style={{"--stripe":stripe,"--vcol":vcol}}>
            <div className="slabel">{label}</div>
            <div className="sval">{val}</div>
            <div className="ssub">{sub}</div>
          </div>
        ))}
      </div>
      <div className="card">
        <div className="ctitle">📈 Balance Mensual (12 meses)</div>
        <MiniBarChart data={monthly} height={240}/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(270px,1fr))",gap:14}}>
        {[
          {title:"💰 Ingresos por Categoría",data:catInc,colors:P1},
          {title:"💳 Ingresos por Método de Pago",data:metodos,colors:["#22D4EF","#10C98A","#9B72F8"]},
          {title:"📋 Gastos por Categoría",data:catGst,colors:P2},
        ].filter(({data})=>data.length>0).map(({title,data,colors})=>(
          <div key={title} className="card">
            <div className="ctitle">{title}</div>
            <MiniPieChart data={data} colors={colors} height={220}/>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── VISTA: EXPORTAR ─────────────────────────────────────────────────────────
function Exportar({ ingresos, pagosGastos, gastosFijos, crmData }) {
  const [desde,setDesde]=useState("");
  const [hasta,setHasta]=useState("");
  const [inclInc,setInclInc]=useState(true);
  const [inclGst,setInclGst]=useState(true);
  const [inclCRM,setInclCRM]=useState(true);
  const [loading,setLoading]=useState(false);

  function exportar(){
    setLoading(true);
    setTimeout(()=>{
      try{
        const wb=XLSX.utils.book_new();
        const ok=d=>(!desde||d>=desde)&&(!hasta||d<=hasta);

        if(inclInc){
          const fi=ingresos.filter(i=>ok(i.date)).sort((a,b)=>a.date.localeCompare(b.date));
          const ws=XLSX.utils.aoa_to_sheet([
            ["Fecha","Descripción","Alumno","Categoría","Método de Pago","Monto Cobrado (MXN)","Comisión MP 3.5% (MXN)","IVA Comisión 16% (MXN)","Total Deducido (MXN)","Neto en Cuenta (MXN)","Notas"],
            ...fi.map(i=>[fmtD(i.date),i.desc,i.alumno||"",i.cat,i.method==="cash"?"Efectivo":i.method==="transfer"?"Transferencia":"Terminal MP",i.monto,i.method==="card"?i.comm:0,i.method==="card"?i.ivaComm:0,i.method==="card"?i.totalDed:0,i.neto,i.notas||""]),
            [],[" TOTALES","","","","",fi.reduce((s,i)=>s+i.monto,0),fi.reduce((s,i)=>s+(i.comm||0),0),fi.reduce((s,i)=>s+(i.ivaComm||0),0),fi.reduce((s,i)=>s+(i.totalDed||0),0),fi.reduce((s,i)=>s+i.neto,0)],
          ]);
          ws["!cols"]=[10,32,22,16,16,14,16,16,14,14,26].map(w=>({wch:w}));
          XLSX.utils.book_append_sheet(wb,ws,"Ingresos");
        }

        if(inclGst){
          const fg=pagosGastos.filter(g=>ok(g.fecha||g.date)).sort((a,b)=>(a.fecha||a.date||"").localeCompare(b.fecha||b.date||""));
          const ws=XLSX.utils.aoa_to_sheet([
            ["Fecha Pago","Descripción","Categoría","Mes","Monto Pagado (MXN)","Notas"],
            ...fg.map(g=>[fmtD(g.fecha||g.date),g.desc,g.cat,g.mes,g.monto,g.notas||""]),
            [],["TOTALES","","","",fg.reduce((s,g)=>s+g.monto,0)],
          ]);
          ws["!cols"]=[10,30,16,10,14,26].map(w=>({wch:w}));
          XLSX.utils.book_append_sheet(wb,ws,"Gastos");

          const wsFe=XLSX.utils.aoa_to_sheet([
            ["Descripción","Monto Mensual","Día de Pago","Categoría","Estado","Notas"],
            ...gastosFijos.map(fe=>[fe.desc,fe.monto,fe.dia,fe.cat,fe.active?"Activo":"Inactivo",fe.notas||""]),
          ]);
          wsFe["!cols"]=[30,14,12,16,10,26].map(w=>({wch:w}));
          XLSX.utils.book_append_sheet(wb,wsFe,"Gastos Fijos Config.");
        }

        // Resumen
        const cm=monthStr();
        const mInc=ingresos.filter(i=>i.date.startsWith(cm));
        const mGst=pagosGastos.filter(g=>g.mes===cm);
        const ws=XLSX.utils.aoa_to_sheet([
          ["RESUMEN CONTABLE — ACADEMIA DE COMPUTACIÓN"],
          ["Generado el",new Date().toLocaleString("es-MX")],[""],
          ["═══ MES ACTUAL — "+new Date().toLocaleDateString("es-MX",{month:"long",year:"numeric"}).toUpperCase()+" ═══"],
          ["Ingresos Brutos del Mes",mInc.reduce((s,i)=>s+i.monto,0)],
          ["Ingresos Netos (en cuenta)",mInc.reduce((s,i)=>s+i.neto,0)],
          ["Total Gastos Pagados",mGst.reduce((s,g)=>s+g.monto,0)],
          ["Balance del Mes",mInc.reduce((s,i)=>s+i.neto,0)-mGst.reduce((s,g)=>s+g.monto,0)],
          ["Comisiones MP del Mes",mInc.filter(i=>i.method==="card").reduce((s,i)=>s+(i.totalDed||0),0)],
          [""],
          ["═══ HISTÓRICO TOTAL ═══"],
          ["Total Ingresos Brutos",ingresos.reduce((s,i)=>s+i.monto,0)],
          ["Total Ingresos Netos",ingresos.reduce((s,i)=>s+i.neto,0)],
          ["Total Gastos Registrados",pagosGastos.reduce((s,g)=>s+g.monto,0)],
          ["Balance Total",ingresos.reduce((s,i)=>s+i.neto,0)-pagosGastos.reduce((s,g)=>s+g.monto,0)],
          ["Total Comisiones MP",ingresos.filter(i=>i.method==="card").reduce((s,i)=>s+(i.totalDed||0),0)],
          [""],
          ["═══ INGRESOS POR MÉTODO (HISTÓRICO) ═══"],
          ["Efectivo",ingresos.filter(i=>i.method==="cash").reduce((s,i)=>s+i.monto,0)],
          ["Transferencia Bancaria",ingresos.filter(i=>i.method==="transfer").reduce((s,i)=>s+i.monto,0)],
          ["Terminal Mercado Pago",ingresos.filter(i=>i.method==="card").reduce((s,i)=>s+i.monto,0)],
          [""],
          ["═══ CONFIGURACIÓN DE COMISIÓN MP ═══"],
          ["Tasa base","3.50%"],
          ["IVA sobre comisión","16.00%"],
          ["Tasa efectiva total","~4.06%"],
        ]);
        ws["!cols"]=[34,18].map(w=>({wch:w}));
        XLSX.utils.book_append_sheet(wb,ws,"Resumen");

        // Hoja CRM — Por alumno
        if(inclCRM && crmData?.matrículas) {
          const alumnos = crmAlumnos(crmData);
          const rows = [["Alumno","Curso(s)","Email","Folio","Total Cobrado (MXN)","Total Neto (MXN)","# Pagos","Pagó este mes"]];
          const cm = monthStr();
          const pagadosMes = new Set(ingresos.filter(i=>i.date.startsWith(cm)&&i.alumno).map(i=>i.alumno));
          alumnos.forEach(a=>{
            const fi = ingresos.filter(i=>i.alumno===a.alumno);
            const total = fi.reduce((s,i)=>s+i.monto,0);
            const neto = fi.reduce((s,i)=>s+i.neto,0);
            rows.push([
              a.alumno, a.cursos.join(", "), a.email||"", a.folios.join(", "),
              total, neto, fi.length, pagadosMes.has(a.alumno)?"Sí":"No"
            ]);
          });
          const wsCrm = XLSX.utils.aoa_to_sheet(rows);
          wsCrm["!cols"]=[24,28,24,12,16,16,8,12].map(w=>({wch:w}));
          XLSX.utils.book_append_sheet(wb,wsCrm,"Alumnos CRM");
        }

        XLSX.writeFile(wb,`Academia_Contabilidad_${todayStr()}.xlsx`);
      }catch(e){alert("Error al exportar: "+e.message);}
      setLoading(false);
    },150);
  }

  return(
    <div>
      <div className="sec-ttl" style={{marginBottom:14}}>📤 Exportar a Excel</div>
      <div className="card">
        <div className="ctitle">⚙️ Opciones de Exportación</div>
        <div className="fgrid" style={{marginBottom:18}}>
          <div className="fgrp"><label className="flbl">Desde (Fecha)</label><input className="finp" type="date" value={desde} onChange={e=>setDesde(e.target.value)}/></div>
          <div className="fgrp"><label className="flbl">Hasta (Fecha)</label><input className="finp" type="date" value={hasta} onChange={e=>setHasta(e.target.value)}/></div>
        </div>
        <div style={{display:"flex",gap:10,marginBottom:22,flexWrap:"wrap"}}>
          {[[inclInc,setInclInc,"💰 Incluir Ingresos"],[inclGst,setInclGst,"📋 Incluir Gastos"]].map(([val,setVal,label])=>(
            <button key={label} className={`btn ${val?"btn-p":"btn-o"}`} onClick={()=>setVal(!val)}>{val?"✓":"○"} {label}</button>
          ))}
          {crmData&&<button className={`btn ${inclCRM?"btn-p":"btn-o"}`} onClick={()=>setInclCRM(!inclCRM)}>{inclCRM?"✓":"○"} 🎓 Incluir Alumnos CRM</button>}
        </div>
        <div className="alert al-ac" style={{marginBottom:18}}>
          <span>📄</span>
          <div>
            <div style={{fontWeight:600,color:"var(--tx)"}}>El archivo incluirá las siguientes hojas:</div>
            <div style={{fontSize:12,marginTop:5,lineHeight:1.7}}>
              {inclInc&&<div>• <strong>Ingresos</strong>: Todas las transacciones con desglose de comisión MP (monto cobrado vs. neto en cuenta)</div>}
              {inclGst&&<><div>• <strong>Gastos</strong>: Pagos realizados de gastos fijos</div><div>• <strong>Gastos Fijos Config.</strong>: Lista de gastos recurrentes configurados</div></>}
              {inclCRM&&crmData&&<div>• <strong>Alumnos CRM</strong>: Histórico de pagos por alumno y estado del mes actual</div>}
              <div>• <strong>Resumen</strong>: Balance general, estadísticas históricas y configuración de comisión MP</div>
            </div>
          </div>
        </div>
        <button className="btn btn-g" style={{fontSize:14,padding:"11px 28px"}} onClick={exportar} disabled={loading||(!inclInc&&!inclGst&&!(inclCRM&&crmData))}>
          {loading?"⏳ Generando...":"📥 Descargar Excel (.xlsx)"}
        </button>
      </div>
      <div className="card">
        <div className="ctitle">📊 Datos disponibles para exportar</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(170px,1fr))",gap:14}}>
          {[
            {l:"Registros de ingresos",v:ingresos.length},
            {l:"Pagos de gastos",v:pagosGastos.length},
            {l:"Gastos fijos activos",v:gastosFijos.filter(f=>f.active).length},
            {l:"Total transacciones",v:ingresos.length+pagosGastos.length},
            ...(crmData?[{l:"Alumnos del CRM",v:crmAlumnos(crmData).length,crm:true}]:[]),
          ].map(({l,v,crm})=>(
            <div key={l} style={{textAlign:"center",padding:16,background:"var(--s2)",borderRadius:8}}>
              <div style={{fontSize:30,fontWeight:800,fontFamily:"var(--mono)",color:crm?"var(--pu)":"var(--ac)"}}>{v}</div>
              <div style={{fontSize:11,color:"var(--tx2)",marginTop:4}}>{l}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── VISTA: PRONÓSTICO DE INGRESOS ───────────────────────────────────────────
function Pronostico({ crmData, ingresos, pagosGastos, gastosFijos }) {
  const [mesSel, setMesSel] = useState(monthStr());

  // Build 13 months: current + 12 future
  const meses = useMemo(()=>{
    const arr=[];
    for(let i=0;i<=12;i++){
      const d=new Date(); d.setDate(1); d.setMonth(d.getMonth()+i);
      arr.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);
    }
    return arr;
  },[]);

  const mesLabel=(ym)=>{
    const[y,m]=ym.split('-');
    const n=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
    return`${n[parseInt(m)-1]} ${y}`;
  };

  // Active students in a given month based on CRM course dates
  const alumnosActivosEnMes = useCallback((ym, mats, cursos)=>{
    if(!mats||!cursos) return [];
    const[y,m]=ym.split('-').map(Number);
    const mesStart=new Date(y,m-1,1);
    const mesEnd=new Date(y,m,0);
    return mats.filter(mat=>{
      const cur=cursos.find(c=>c.nombre===mat.curso);
      if(!cur) return true; // no date = assume active
      const fin=cur.fechaFin?new Date(cur.fechaFin+'T00:00:00'):null;
      const ini=cur.fechaInicio?new Date(cur.fechaInicio+'T00:00:00'):null;
      if(ini&&ini>mesEnd) return false;
      if(fin&&fin<mesStart) return false;
      return true;
    });
  },[]);

  const mats = crmData?.matrículas||[];
  const cursos = crmData?.cursos||[];

  // Income already registered for a month (real)
  const ingresoReal=(ym)=>{
    const appInc = ingresos.filter(i=>i.date.startsWith(ym)).reduce((s,i)=>s+i.neto,0);
    const crmInc = (crmData?.pagosRegulares||[]).filter(p=>(p.fecha?.startsWith(ym)||p.fechaISO?.startsWith(ym))).reduce((s,p)=>s+(p.neto||p.montoFinal||0),0);
    return appInc+crmInc;
  };

  // Min projected income = sum of base costs of active students
  const ingresoProyectado=(ym)=>
    alumnosActivosEnMes(ym, mats, cursos).reduce((s,mat)=>{
      const cur=cursos.find(c=>c.nombre===mat.curso);
      return s+(cur?parseFloat(String(cur.costoBase||'').replace(/[^0-9.]/g,''))||0:0);
    },0);

  // Fixed expenses for a month
  const gastosFijosMes=(ym)=>gastosFijos.filter(g=>g.active).reduce((s,g)=>s+g.monto,0);

  // Timeline data
  const timeline = useMemo(()=>meses.map(ym=>({
    ym,
    label:mesLabel(ym),
    activos:alumnosActivosEnMes(ym,mats,cursos).length,
    proyectado:ingresoProyectado(ym),
    real:ingresoReal(ym),
    gastos:gastosFijosMes(ym),
    balance:ingresoProyectado(ym)-gastosFijosMes(ym),
    isPast:ym<monthStr(),
  })),[meses,mats,cursos,ingresos,crmData,gastosFijos]);

  // Selected month detail
  const activosSel = alumnosActivosEnMes(mesSel, mats, cursos);
  const porCurso = useMemo(()=>{
    const m={};
    activosSel.forEach(mat=>{
      if(!m[mat.curso])m[mat.curso]={count:0,costo:0,fin:null};
      m[mat.curso].count++;
      const cur=cursos.find(c=>c.nombre===mat.curso);
      m[mat.curso].costo=cur?parseFloat(String(cur.costoBase||'').replace(/[^0-9.]/g,''))||0:0;
      m[mat.curso].fin=cur?.fechaFin||null;
    });
    return m;
  },[activosSel,cursos]);

  const totalProy=ingresoProyectado(mesSel);
  const totalReal=ingresoReal(mesSel);
  const totalGastos=gastosFijosMes(mesSel);
  const maxVal=Math.max(...timeline.map(t=>t.proyectado),1);
  const cm=monthStr();

  if(!crmData) return(
    <div>
      <div className="sec-ttl" style={{marginBottom:14}}>📈 Pronóstico de Ingresos</div>
      <div className="crm-off">
        <span style={{fontSize:20}}>🔌</span>
        <div>
          <div style={{fontWeight:600,color:"var(--tx)"}}>CRM no conectado</div>
          <div style={{color:"var(--tx2)"}}>El pronóstico requiere los datos del CRM (alumnos, cursos y fechas de inicio/fin).</div>
        </div>
      </div>
    </div>
  );

  return(
    <div>
      <div className="sec-hdr">
        <div>
          <div className="sec-ttl">📈 Pronóstico de Ingresos</div>
          <div style={{fontSize:11,color:"var(--tx2)",marginTop:2}}>Proyección basada en alumnos regulares del CRM · {mats.length} matrículas · {cursos.length} cursos</div>
        </div>
      </div>

      {/* Stats rápidos del mes actual */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:10,marginBottom:18}}>
        {[
          {l:"Alumnos activos hoy",v:alumnosActivosEnMes(cm,mats,cursos).length,c:"var(--ac)"},
          {l:"Ingreso mín. este mes",v:fmt$(ingresoProyectado(cm)),c:"var(--gr)",mono:true},
          {l:"Ya cobrado este mes",v:fmt$(ingresoReal(cm)),c:"var(--gr)",mono:true},
          {l:"Gastos fijos mes",v:fmt$(totalGastos),c:"var(--rd)",mono:true},
        ].map(({l,v,c,mono})=>(
          <div key={l} className="mini-stat">
            <div className="ms-label">{l}</div>
            <div className="ms-val" style={{color:c,fontSize:mono?16:22,fontFamily:mono?"var(--mono)":"inherit"}}>{v}</div>
          </div>
        ))}
      </div>

      {/* Gráfica de barras — 13 meses */}
      <div className="card" style={{marginBottom:18}}>
        <div className="ctitle">📊 Proyección de ingresos mínimos — próximos 13 meses</div>
        <div style={{overflowX:"auto",paddingBottom:4}}>
          <div style={{display:"flex",gap:5,alignItems:"flex-end",minWidth:600,height:130,padding:"8px 4px 0"}}>
            {timeline.map(({ym,label,proyectado,real,activos,isPast})=>{
              const pct=maxVal>0?Math.max(proyectado/maxVal,0.04):0.04;
              const realPct=maxVal>0?Math.max(real/maxVal,0.04):0;
              const isCur=ym===cm; const isSel=ym===mesSel;
              return(
                <div key={ym} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,cursor:"pointer"}} onClick={()=>setMesSel(ym)}>
                  <div style={{fontSize:9,fontFamily:"var(--mono)",color:"var(--tx3)",whiteSpace:"nowrap"}}>{activos}👤</div>
                  <div style={{width:"100%",position:"relative",height:Math.round(pct*90)+"px"}}>
                    {/* Projected bar */}
                    <div style={{position:"absolute",bottom:0,left:0,right:0,height:"100%",background:isSel?"var(--ac)":isCur?"var(--gr)":"var(--s3)",borderRadius:"4px 4px 0 0",opacity:isPast?.5:1}}/>
                    {/* Real bar (overlay) */}
                    {real>0&&<div style={{position:"absolute",bottom:0,left:0,right:0,height:Math.round(realPct*90)+"px",background:"rgba(16,201,138,.6)",borderRadius:"4px 4px 0 0",maxHeight:"100%"}}/>}
                  </div>
                  <div style={{fontSize:9,color:isSel?"var(--ac)":isCur?"var(--gr)":"var(--tx3)",fontWeight:isSel||isCur?700:400,textAlign:"center",lineHeight:1.2,whiteSpace:"nowrap"}}>{label.split(' ')[0]}<br/>{label.split(' ')[1]}</div>
                </div>
              );
            })}
          </div>
          <div style={{display:"flex",gap:14,marginTop:8,fontSize:11,color:"var(--tx3)"}}>
            <span><span style={{background:"var(--ac)",width:10,height:10,display:"inline-block",borderRadius:2,marginRight:4}}/>Proyectado</span>
            <span><span style={{background:"rgba(16,201,138,.6)",width:10,height:10,display:"inline-block",borderRadius:2,marginRight:4}}/>Real cobrado</span>
          </div>
        </div>
      </div>

      {/* Selector de mes */}
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16,flexWrap:"wrap"}}>
        <div style={{fontWeight:700,fontSize:14}}>Detalle de:</div>
        <select className="finput" style={{maxWidth:200,fontWeight:600,color:"var(--ac)"}} value={mesSel} onChange={e=>setMesSel(e.target.value)}>
          {meses.map(ym=><option key={ym} value={ym}>{mesLabel(ym)}</option>)}
        </select>
        <div style={{fontSize:13,color:"var(--tx2)"}}>
          <strong style={{color:"var(--ac)",fontSize:16}}>{activosSel.length}</strong> alumnos activos ·
          <strong style={{color:"var(--gr)",fontFamily:"var(--mono)",marginLeft:4}}>{fmt$(totalProy)}</strong> ingreso mínimo ·
          <strong style={{color:"var(--rd)",fontFamily:"var(--mono)",marginLeft:4}}>-{fmt$(totalGastos)}</strong> gastos fijos ·
          <strong style={{color:totalProy-totalGastos>=0?"var(--gr)":"var(--rd)",fontFamily:"var(--mono)",marginLeft:4}}>{fmt$(totalProy-totalGastos)}</strong> balance
        </div>
      </div>

      {/* Tabla detalle por curso */}
      {Object.keys(porCurso).length===0?(
        <div className="empty"><div className="empty-icon">📭</div><div className="empty-ttl">Sin alumnos activos para {mesLabel(mesSel)}</div></div>
      ):(
        <div className="card" style={{padding:0}}>
          <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
            <thead>
              <tr style={{background:"var(--s2)"}}>
                {["Curso","Fin del curso","Alumnos activos","Costo base / mes","Ingreso mínimo"].map(h=>(
                  <th key={h} style={{padding:"9px 14px",textAlign:h.includes("Ingreso")||h.includes("Costo")||h.includes("Alumnos")?"right":"left",fontSize:11,fontWeight:600,color:"var(--tx2)",textTransform:"uppercase",letterSpacing:".5px",borderBottom:"1px solid var(--br)"}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {Object.entries(porCurso).map(([curso,d])=>{
                const expired=d.fin&&new Date(d.fin+'T00:00:00')<new Date();
                return(
                  <tr key={curso} style={{borderBottom:"1px solid var(--br)"}}>
                    <td style={{padding:"11px 14px",fontWeight:600}}>{curso}</td>
                    <td style={{padding:"11px 14px",fontSize:12,fontFamily:"var(--mono)",color:expired?"var(--rd)":d.fin?"var(--tx2)":"var(--tx3)"}}>
                      {d.fin||"∞ Sin fecha"}
                      {expired&&<span style={{marginLeft:6,fontSize:10,background:"var(--rd)",color:"#fff",borderRadius:4,padding:"1px 5px"}}>VENCIDO</span>}
                    </td>
                    <td style={{padding:"11px 14px",textAlign:"right",fontWeight:700}}>{d.count}</td>
                    <td style={{padding:"11px 14px",textAlign:"right",fontFamily:"var(--mono)",color:"var(--ac)"}}>{fmt$(d.costo)}</td>
                    <td style={{padding:"11px 14px",textAlign:"right",fontFamily:"var(--mono)",fontWeight:700,color:"var(--gr)"}}>{fmt$(d.costo*d.count)}</td>
                  </tr>
                );
              })}
              {/* Total row */}
              <tr style={{background:"var(--s2)",fontWeight:700}}>
                <td colSpan={2} style={{padding:"11px 14px"}}>TOTAL {mesLabel(mesSel)}</td>
                <td style={{padding:"11px 14px",textAlign:"right"}}>{activosSel.length}</td>
                <td/>
                <td style={{padding:"11px 14px",textAlign:"right",fontFamily:"var(--mono)",color:"var(--gr)",fontSize:15}}>{fmt$(totalProy)}</td>
              </tr>
              {/* Gastos fijos row */}
              {totalGastos>0&&(
                <tr style={{borderTop:"2px solid var(--br)"}}>
                  <td colSpan={4} style={{padding:"11px 14px",color:"var(--tx2)"}}>
                    📋 Gastos fijos mensuales ({gastosFijos.filter(g=>g.active).length} conceptos)
                  </td>
                  <td style={{padding:"11px 14px",textAlign:"right",fontFamily:"var(--mono)",color:"var(--rd)",fontWeight:700}}>-{fmt$(totalGastos)}</td>
                </tr>
              )}
              {/* Balance row */}
              <tr style={{background:totalProy-totalGastos>=0?"rgba(16,201,138,.06)":"rgba(244,107,107,.06)",borderTop:"1px solid var(--br)"}}>
                <td colSpan={4} style={{padding:"11px 14px",fontWeight:700}}>
                  {totalProy-totalGastos>=0?"✅":"⚠️"} Balance mínimo estimado
                </td>
                <td style={{padding:"11px 14px",textAlign:"right",fontFamily:"var(--mono)",fontWeight:800,fontSize:15,color:totalProy-totalGastos>=0?"var(--gr)":"var(--rd)"}}>
                  {fmt$(totalProy-totalGastos)}
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      )}

      <div style={{marginTop:14,fontSize:11,color:"var(--tx3)",lineHeight:1.6}}>
        ⚠️ <strong>Ingreso mínimo</strong> = suma del costo base de cada alumno activo ese mes, asumiendo pago completo sin descuentos. No incluye promociones ni pagos parciales.
        Los cursos sin fecha de finalización se consideran activos indefinidamente. Configura las fechas en el CRM → Cursos para mayor precisión.
      </div>
    </div>
  );
}

// ─── APP PRINCIPAL ───────────────────────────────────────────────────────────
function App() {
  const [tab,setTab]=useState("dashboard");
  const [ingresos,setIngresos]=useState([]);
  const [gastosFijos,setGastosFijos]=useState([]);
  const [pagosGastos,setPagosGastos]=useState([]);
  const [crmData,setCrmData]=useState(null);
  const [crmSource,setCrmSource]=useState(null);
  const [loaded,setLoaded]=useState(false);
  const [showRem,setShowRem]=useState(false);
  // Custom expense categories
  const [expenseCats,setExpenseCats]=useState(DEFAULT_EXPENSE_CATS);
  // Currency
  const [currency,setCurrency]=useState("MXN");
  const [usdRate,setUsdRate]=useState(null);
  const [loadingRate,setLoadingRate]=useState(false);

  useEffect(()=>{
    let offCont=null, offCrm=null;
    (async()=>{
      // Cache local instantánea mientras conecta Firebase
      try{
        setIngresos(JSON.parse(localStorage.getItem("acad_v1_ingresos")||"[]"));
        setGastosFijos(JSON.parse(localStorage.getItem("acad_v1_gastosFijos")||"[]"));
        setPagosGastos(JSON.parse(localStorage.getItem("acad_v1_pagosGastos")||"[]"));
        const cats=JSON.parse(localStorage.getItem("acad_v1_expenseCats")||"null");
        if(cats&&cats.length) setExpenseCats(cats);
      }catch{}

      const ok=await initFirebaseAuth();
      if(ok&&_fbDb){
        offCont=(snap)=>{
          const d=snap.val()||{};
          setIngresos(d.ingresos||[]);
          setGastosFijos(d.gastosFijos||[]);
          setPagosGastos(d.pagosGastos||[]);
          if(d.expenseCats&&d.expenseCats.length) setExpenseCats(d.expenseCats);
          try{
            localStorage.setItem("acad_v1_ingresos",JSON.stringify(d.ingresos||[]));
            localStorage.setItem("acad_v1_gastosFijos",JSON.stringify(d.gastosFijos||[]));
            localStorage.setItem("acad_v1_pagosGastos",JSON.stringify(d.pagosGastos||[]));
            if(d.expenseCats) localStorage.setItem("acad_v1_expenseCats",JSON.stringify(d.expenseCats));
          }catch{}
          setLoaded(true);
        };
        _fbDb.ref('nova_contabilidad').on('value',offCont);

        offCrm=(snap)=>{
          const d=snap.val();
          if(d?.matrículas){ setCrmData({...d,_source:'firebase'}); setCrmSource('firebase'); }
          else { setCrmData(null); setCrmSource(null); }
        };
        _fbDb.ref('nova_crm').on('value',offCrm);
      } else {
        setLoaded(true);
      }
    })();
    return ()=>{
      if(_fbDb&&offCont) _fbDb.ref('nova_contabilidad').off('value',offCont);
      if(_fbDb&&offCrm) _fbDb.ref('nova_crm').off('value',offCrm);
    };
  },[]);

  async function fetchUSDRate(){
    setLoadingRate(true);
    try{
      const r=await fetch("https://open.er-api.com/v6/latest/USD");
      const d=await r.json();
      if(d.rates?.MXN) setUsdRate(d.rates.MXN);
    }catch(e){}
    setLoadingRate(false);
  }

  function toggleCurrency(){
    const next=currency==="MXN"?"USD":"MXN";
    setCurrency(next);
    if(next==="USD"&&!usdRate) fetchUSDRate();
  }

  // Money display helper that respects current currency
  const showMoney=(mxn)=>currency==="USD"&&usdRate?`$${((mxn||0)/usdRate).toFixed(2)} USD`:fmt$(mxn);

  async function addExpenseCat(name){
    const upd=[...expenseCats.filter(c=>c!==name),name];
    setExpenseCats(upd);
    await stor("set","expenseCats",upd);
  }

  async function onImport(data){
    if(!data || typeof data!=="object") throw new Error("Formato no reconocido.");
    const MAP={ingresos:"ingresos",gastosFijos:"gastos fijos",pagosGastos:"pagos registrados",expenseCats:"categorías"};
    const applied=[];
    for(const k of Object.keys(MAP)){
      if(data[k]!=null){
        if(k==="ingresos") setIngresos(data[k]);
        else if(k==="gastosFijos") setGastosFijos(data[k]);
        else if(k==="pagosGastos") setPagosGastos(data[k]);
        else if(k==="expenseCats" && Array.isArray(data[k]) && data[k].length) setExpenseCats(data[k]);
        await stor("set",k,data[k]);
        applied.push(MAP[k]);
      }
    }
    if(applied.length===0) throw new Error("El JSON no contiene datos reconocibles (ingresos, gastosFijos, pagosGastos, expenseCats).");
    return `Importado: ${applied.join(", ")}.`;
  }

  async function refrescarCRM(){
    setCrmSource(null);
    const c=await loadCRM();
    setCrmData(c||null);
    setCrmSource(c?._source||null);
  }

  const upcoming=useMemo(()=>{
    if(!loaded) return [];
    const hoyISO=todayStr();
    const cmNow=monthStr();
    const out=[];
    gastosFijos.filter(fe=>fe.active).forEach(fe=>{
      [cmNow,nextMonth(cmNow)].forEach(ym=>{
        ocurrenciasGasto(fe,ym).forEach(fecha=>{
          if(pagoDeOcurrencia(fe,fecha,pagosGastos)) return;
          const diff=Math.round((new Date(fecha+'T00:00:00')-new Date(hoyISO+'T00:00:00'))/86400000);
          if(diff<=7) out.push({...fe,_fecha:fecha,daysUntilDue:diff,isOverdue:diff<0,isDueSoon:diff>=0&&diff<=7});
        });
      });
    });
    return out.sort((a,b)=>a.daysUntilDue-b.daysUntilDue);
  },[gastosFijos,pagosGastos,loaded]);

  useEffect(()=>{if(loaded&&upcoming.length>0) setShowRem(true);},[loaded,upcoming.length]);

  // ─── Auto-sincronización CRM → Ingresos ───────────────────────────────────
  // Cuando un contrato del CRM se marca "pagado", el CRM ya guarda método de pago,
  // comisión MP, IVA y neto (pagosRegulares). Aquí, en cuanto Firebase nos entrega
  // ese pago y no existe ya un ingreso con el mismo crmFolio, lo creamos automáticamente
  // — sin que el usuario tenga que capturarlo a mano. Sigue siendo editable después
  // como cualquier otro ingreso (mismo arreglo `ingresos`).
  useEffect(()=>{
    if(!loaded) return;
    const pagosReg = crmData?.pagosRegulares||[];
    const pagosFolios = new Set(pagosReg.filter(p=>p.crmFolio!=null).map(p=>String(p.crmFolio)));
    const existentes = new Set(ingresos.filter(i=>i.crmFolio).map(i=>String(i.crmFolio)));

    // Nuevos: pagos del CRM que aún no tienen un ingreso correspondiente
    const nuevos = pagosReg.filter(p=>p.crmFolio!=null && !existentes.has(String(p.crmFolio)));
    const creados = nuevos.map(p=>({
      id: uid(),
      date: (p.fechaISO||p.fecha||todayStr()).slice(0,10),
      desc: p.curso+(p.notas?` — ${p.notas}`:""),
      alumno: p.alumnoNombre||"", cursoRef: p.curso||"", crmFolio: String(p.crmFolio),
      monto: p.montoFinal||0, method: p.method||"cash",
      cat: "Mensualidad", notas: p.notas||"",
      comm: p.commMP||0, ivaComm: p.ivaMP||0, totalDed: (p.commMP||0)+(p.ivaMP||0),
      neto: p.neto??(p.montoFinal||0),
      createdAt: new Date().toISOString(),
      autoSync: true,
    }));

    // Huérfanos: ingresos que NOSOTROS creamos automáticamente, cuyo pago de origen
    // ya no existe en el CRM (el contrato fue eliminado). Solo se eliminan los
    // marcados autoSync — un ingreso capturado manualmente nunca se borra solo.
    const huerfanos = ingresos.filter(i=>i.autoSync && i.crmFolio && !pagosFolios.has(String(i.crmFolio)));

    if(nuevos.length===0 && huerfanos.length===0) return;

    const huerfanoIds = new Set(huerfanos.map(i=>i.id));
    const upd=[...ingresos.filter(i=>!huerfanoIds.has(i.id)), ...creados];
    setIngresos(upd);
    stor("set","ingresos",upd);
  },[crmData, ingresos, loaded]);

  const TABS=[
    {id:"dashboard",icon:"🏠",label:"Inicio"},
    {id:"ingresos",icon:"💰",label:"Ingresos"},
    {id:"alumnos",icon:"🎓",label:crmData?"Alumnos CRM":"Alumnos",crm:true},
    {id:"pronostico",icon:"📈",label:crmData?"Pronóstico":"Pronóstico",crm:true},
    {id:"gastos",icon:"📋",label:"Gastos Fijos"},
    {id:"comisiones",icon:"💼",label:"Comisiones",crm:true},
    {id:"historial",icon:"📜",label:"Historial"},
    {id:"reportes",icon:"📊",label:"Reportes"},
    {id:"exportar",icon:"📤",label:"Exportar"},
  ];

  if(!loaded) return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:"var(--bg)",fontFamily:"var(--sans)",color:"var(--tx2)"}}>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:40,marginBottom:10,animation:"spin 1s linear infinite"}}>⚡</div>
        <div>Cargando tu contabilidad...</div>
      </div>
    </div>
  );

  return(
    <>
      <style dangerouslySetInnerHTML={{__html: CSS}} />
      <div className="app">
        {showRem&&upcoming.length>0&&<ModalRecordatorios pagos={upcoming} onClose={()=>setShowRem(false)}/>}

        <div className="hdr">
          <div className="hdr-logo">🎓</div>
          <div style={{flex:1}}>
            <div className="hdr-title">Academia de Computación</div>
            <div className="hdr-sub">{new Date().toLocaleDateString("es-MX",{weekday:"long",day:"numeric",month:"long",year:"numeric"})}</div>
          </div>
          {crmData&&(
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span className="badge b-crm" style={{fontSize:10,padding:"3px 8px"}}>
                {crmSource==="firebase"?"☁️ Firebase — Tiempo real":crmSource==="claude"?"🔵 Claude.ai Storage":"💾 Local"}
              </span>
              <button onClick={refrescarCRM} title="Actualizar datos del CRM" style={{background:"none",border:"none",cursor:"pointer",color:"var(--tx3)",fontSize:16,padding:"2px 4px",lineHeight:1}} >⟳</button>
            </div>
          )}
          {!crmData&&loaded&&(
            <button onClick={refrescarCRM} className="btn btn-o btn-sm" style={{fontSize:11}}>🔌 Conectar CRM</button>
          )}
          <button onClick={toggleCurrency} title={currency==="MXN"?"Ver en USD":"Ver en MXN"} className="btn btn-o btn-sm" style={{fontSize:11,minWidth:60,fontFamily:"var(--mono)",fontWeight:700,color:currency==="USD"?"var(--am)":"var(--tx2)"}}>
            {loadingRate?"⏳":currency==="MXN"?"🇲🇽 MXN":"🇺🇸 USD"}
          </button>
          {currency==="USD"&&usdRate&&<div style={{fontSize:10,color:"var(--tx3)",whiteSpace:"nowrap"}}>1 USD = {fmt$(usdRate)}</div>}
          {upcoming.length>0&&(
            <button className={`btn btn-sm ${upcoming.some(p=>p.isOverdue)?"btn-d":"btn-am"}`} onClick={()=>setShowRem(true)}>
              {upcoming.some(p=>p.isOverdue)?"🚨":"⏰"} {upcoming.length} pendiente(s)
            </button>
          )}
        </div>

        <nav className="nav">
          {TABS.map(t=>(
            <button key={t.id} className={`ntab ${tab===t.id?"active":""}`} onClick={()=>setTab(t.id)} style={t.crm&&crmData?{color:tab===t.id?"var(--pu)":"var(--tx2)"}:{}}>
              {t.icon} {t.label}
              {t.crm&&crmData&&tab!==t.id&&(()=>{
                const cm=monthStr();
                const pag=new Set([
                  ...ingresos.filter(i=>i.date.startsWith(cm)&&i.alumno).map(i=>i.alumno),
                  ...(crmData.pagosRegulares||[]).filter(p=>(p.fecha?.startsWith(cm)||p.fechaISO?.startsWith(cm))).map(p=>p.alumnoNombre)
                ]);
                const mor=crmAlumnos(crmData).filter(a=>!pag.has(a.alumno)).length;
                return mor>0?<span style={{background:"var(--rd)",color:"#fff",borderRadius:10,fontSize:9,padding:"1px 5px",marginLeft:4}}>{mor}</span>:null;
              })()}
            </button>
          ))}
        </nav>

        <div className="cnt">
          {tab==="dashboard"&&<Dashboard ingresos={ingresos} gastosFijos={gastosFijos} pagosGastos={pagosGastos} upcoming={upcoming} setTab={setTab} crmData={crmData} crmSource={crmSource} refrescarCRM={refrescarCRM} onImport={onImport}/>}
          {tab==="ingresos"&&<Ingresos ingresos={ingresos} setIngresos={setIngresos} crmData={crmData} showMoney={showMoney}/>}
          {tab==="alumnos"&&<AlumnosCRM crmData={crmData} ingresos={ingresos} setIngresos={setIngresos}/>}
          {tab==="pronostico"&&<Pronostico crmData={crmData} ingresos={ingresos} pagosGastos={pagosGastos} gastosFijos={gastosFijos}/>}
          {tab==="gastos"&&<GastosFijos gastosFijos={gastosFijos} setGastosFijos={setGastosFijos} pagosGastos={pagosGastos} setPagosGastos={setPagosGastos} expenseCats={expenseCats} addExpenseCat={addExpenseCat} showMoney={showMoney}/>}
          {tab==="comisiones"&&<ComisionesEmpleados crmData={crmData} pagosGastos={pagosGastos} setPagosGastos={setPagosGastos} showMoney={showMoney}/>}
          {tab==="historial"&&<Historial ingresos={ingresos} pagosGastos={pagosGastos}/>}
          {tab==="reportes"&&<Reportes ingresos={ingresos} pagosGastos={pagosGastos}/>}
          {tab==="exportar"&&<Exportar ingresos={ingresos} pagosGastos={pagosGastos} gastosFijos={gastosFijos} crmData={crmData}/>}
        </div>
      </div>
    </>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
